server:
  port: ${TIKEE_DEMO_SERVER_PORT:18080}

spring:
  application:
    name: tikee-spring-worker-demo
  output:
    ansi:
      enabled: always

tikee:
  worker:
    dry-run: ${TIKEE_WORKER_DRY_RUN:false}
    endpoint: ${TIKEE_WORKER_ENDPOINT:http://127.0.0.1:9998}
    namespace: default
    app: default
    cluster: local
    region: local
    capabilities:
      - java
      - spring-boot
    labels:
      runtime: java
      demo: spring-worker
    wasm:
      enabled: ${TIKEE_WORKER_WASM_ENABLED:true}
      runtime-command: ${TIKEE_WORKER_WASM_RUNTIME:wasmtime}
      availability-check: ${TIKEE_WORKER_WASM_RUNTIME_CHECK:true}
    scripts:
      enabled: ${TIKEE_WORKER_SCRIPTS_ENABLED:false}
      runtime-command: ${TIKEE_WORKER_CONTAINER_RUNTIME:docker}
      availability-check: ${TIKEE_WORKER_SCRIPT_RUNTIME_CHECK:true}
      images:
        shell: ${TIKEE_WORKER_SCRIPT_SHELL_IMAGE:alpine:3.20}
        python: ${TIKEE_WORKER_SCRIPT_PYTHON_IMAGE:python:3.13-alpine}
        node: ${TIKEE_WORKER_SCRIPT_NODE_IMAGE:node:24-alpine}
        powershell: ${TIKEE_WORKER_SCRIPT_POWERSHELL_IMAGE:mcr.microsoft.com/powershell:7.5-alpine-3.20}

  management:
    enabled: ${TIKEE_MANAGEMENT_ENABLED:false}
    endpoint: ${TIKEE_MANAGEMENT_ENDPOINT:http://127.0.0.1:9999}
    token: ${TIKEE_MANAGEMENT_TOKEN:}
    namespace: ${TIKEE_MANAGEMENT_NAMESPACE:default}
    app: ${TIKEE_MANAGEMENT_APP:default}
