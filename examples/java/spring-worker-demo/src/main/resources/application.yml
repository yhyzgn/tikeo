server:
  port: ${TIKEE_DEMO_SERVER_PORT:18080}

spring:
  application:
    name: tikee-spring-worker-demo
  output:
    ansi:
      enabled: always

tikee:
  worker:
    dry-run: ${TIKEE_WORKER_DRY_RUN:false}
    endpoint: ${TIKEE_WORKER_ENDPOINT:http://127.0.0.1:9998}
    namespace: default
    app: default
    cluster: local
    region: local
    capabilities:
      - java
      - spring-boot
    labels:
      runtime: java
      demo: spring-worker

  management:
    enabled: ${TIKEE_MANAGEMENT_ENABLED:false}
    endpoint: ${TIKEE_MANAGEMENT_ENDPOINT:http://127.0.0.1:9999}
    token: ${TIKEE_MANAGEMENT_TOKEN:}
    namespace: ${TIKEE_MANAGEMENT_NAMESPACE:default}
    app: ${TIKEE_MANAGEMENT_APP:default}
