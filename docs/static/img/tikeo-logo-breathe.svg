<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Tikeo animated task-flow logo</title>
  <desc id="desc">Animated SVG version of the original Tikeo hexagonal task-flow logo.</desc>
  <defs>
    <linearGradient id="shell" x1="50" y1="42" x2="170" y2="178" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="var(--primary)"/><stop offset="55%" stop-color="var(--secondary)"/><stop offset="100%" stop-color="var(--tertiary)"/></linearGradient>
    <linearGradient id="inner" x1="74" y1="70" x2="148" y2="152" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#bfdbfe" stop-opacity=".34"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity=".16"/></linearGradient>
    <filter id="glow" x="-28%" y="-28%" width="156%" height="156%"><feGaussianBlur stdDeviation="4.2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    :root{--primary:#2450d8;--secondary:#3b82f6;--tertiary:#6aa2ff;--accent:#22d3ee;--shadow:rgba(15,23,42,.24)}
    @media (prefers-color-scheme:dark){:root{--primary:#1d4ed8;--secondary:#60a5fa;--tertiary:#93c5fd;--accent:#67e8f9;--shadow:rgba(2,6,23,.42)}}
    .breath{animation:breathe 3.6s ease-in-out infinite;transform-origin:110px 110px}.flow{animation:flow 3.6s ease-in-out infinite;filter:drop-shadow(0 5px 10px rgba(15,23,42,.2))}.shadow{fill:var(--shadow);transform:translateY(8px) scale(.96);transform-origin:110px 110px}.shell{fill:url(#shell);stroke:rgba(219,234,254,.58);stroke-width:2;filter:url(#glow)}.inner{fill:url(#inner);stroke:rgba(219,234,254,.42);stroke-width:3}.line,.arrow{fill:none;stroke:#fff;stroke-linecap:round;stroke-linejoin:round}.line{stroke-width:8.5}.arrow{stroke-width:8}.halo{fill:#fff}.node{fill:#eef6ff}.accent{fill:var(--accent)}@keyframes breathe{0%,100%{opacity:.92;transform:scale(.985)}50%{opacity:1;transform:scale(1.035)}}@keyframes flow{0%,100%{opacity:.9;transform:translateY(1px)}50%{opacity:1;transform:translateY(-1px)}}@media (prefers-reduced-motion:reduce){.breath,.flow{animation:none}}
  </style>
  <g class="breath"><path class="shadow" d="M110 40 171 75v70l-61 35-61-35V75l61-35Z"/><path class="shell" d="M110 40 171 75v70l-61 35-61-35V75l61-35Z"/><path class="inner" d="M110 62 151 86v48l-41 24-41-24V86l41-24Z"/></g>
  <g class="flow"><path class="line" d="M75 94H111V145"/><path class="line" d="M111 94H146"/><path class="arrow" d="M136 77 156 97 136 117"/><circle class="halo" cx="75" cy="94" r="16"/><circle class="halo" cx="111" cy="94" r="16"/><circle class="halo" cx="111" cy="145" r="16"/><circle class="node" cx="75" cy="94" r="7"/><circle class="accent" cx="111" cy="94" r="7"/><circle class="node" cx="111" cy="145" r="7"/></g>
</svg>
