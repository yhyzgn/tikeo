<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
<title id="title">Job instance lifecycle</title><desc id="desc">States, attempts, retries, notifications, and console evidence.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#16a34a"/><stop offset="1" stop-color="#7c3aed"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/></marker></defs>
<rect width="1180" height="620" rx="36" fill="url(#bg)"/>
<text x="56" y="70" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Job instance lifecycle</text>
<text x="56" y="108" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#475569">States, attempts, retries, notifications, and console evidence.</text>
<path d="M225 172 C335.0 100, 295.0 50, 405 122" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.56" marker-end="url(#arrow)"/>
<text x="310" y="113" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a">enqueue</text>
<path d="M495 122 C610.0 50, 570.0 100, 685 172" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.56" marker-end="url(#arrow)"/>
<text x="585" y="113" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a">claim</text>
<path d="M775 172 C880.0 100, 840.0 200, 945 272" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.56" marker-end="url(#arrow)"/>
<text x="855" y="188" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a">retryable</text>
<path d="M1035 272 C880.0 200, 840.0 100, 685 172" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.56" marker-end="url(#arrow)"/>
<text x="855" y="188" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a">next attempt</text>
<path d="M775 172 C785.0 100, 745.0 400, 755 472" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.56" marker-end="url(#arrow)"/>
<text x="760" y="288" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a">ok</text>
<path d="M1035 272 C760.0 200, 720.0 440, 445 512" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.56" marker-end="url(#arrow)"/>
<text x="735" y="358" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a">exhausted</text>
<path d="M845 472 C530.0 400, 490.0 330, 175 402" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.56" marker-end="url(#arrow)"/>
<text x="505" y="403" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a">review</text>
<g filter="url(#shadow)"><rect x="120" y="130" width="220" height="86" rx="18" fill="#ffffff" stroke="#dbeafe"/><circle cx="150" cy="162" r="15" fill="url(#accent)"/><text x="150" y="167" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">1</text><text x="178" y="161" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Create</text><text x="140" y="192" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">trigger or schedule</text></g>
<g filter="url(#shadow)"><rect x="390" y="80" width="220" height="86" rx="18" fill="#ffffff" stroke="#dbeafe"/><circle cx="420" cy="112" r="15" fill="url(#accent)"/><text x="420" y="117" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">2</text><text x="448" y="111" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Pending</text><text x="410" y="142" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">queued for worker</text></g>
<g filter="url(#shadow)"><rect x="670" y="130" width="220" height="86" rx="18" fill="#ffffff" stroke="#dbeafe"/><circle cx="700" cy="162" r="15" fill="url(#accent)"/><text x="700" y="167" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">3</text><text x="728" y="161" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Running</text><text x="690" y="192" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">attempt starts</text></g>
<g filter="url(#shadow)"><rect x="930" y="230" width="220" height="86" rx="18" fill="#ffffff" stroke="#dbeafe"/><circle cx="960" cy="262" r="15" fill="url(#accent)"/><text x="960" y="267" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">4</text><text x="988" y="261" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Retrying</text><text x="950" y="292" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">failed attempt + backoff</text></g>
<g filter="url(#shadow)"><rect x="740" y="430" width="220" height="86" rx="18" fill="#ffffff" stroke="#dbeafe"/><circle cx="770" cy="462" r="15" fill="url(#accent)"/><text x="770" y="467" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">5</text><text x="798" y="461" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Succeeded</text><text x="760" y="492" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">result committed</text></g>
<g filter="url(#shadow)"><rect x="430" y="470" width="220" height="86" rx="18" fill="#ffffff" stroke="#dbeafe"/><circle cx="460" cy="502" r="15" fill="url(#accent)"/><text x="460" y="507" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">6</text><text x="488" y="501" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Failed</text><text x="450" y="532" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">terminal evidence</text></g>
<g filter="url(#shadow)"><rect x="160" y="360" width="220" height="86" rx="18" fill="#ffffff" stroke="#dbeafe"/><circle cx="190" cy="392" r="15" fill="url(#accent)"/><text x="190" y="397" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">7</text><text x="218" y="391" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Console</text><text x="180" y="422" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">logs + delivery</text></g>
</svg>
