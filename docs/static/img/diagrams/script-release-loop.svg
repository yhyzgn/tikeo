<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
<title id="title">Script release loop</title><desc id="desc">Draft, review, immutable publish, job binding, and rollback.</desc>
