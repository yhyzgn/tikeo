      .tiny{font:700 10.5px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}
      .mono{font:800 11.5px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;fill:#f8fafc}
      .white{fill:#fff}.muted{fill:#dbeafe}.darkText{fill:#0f172a}
