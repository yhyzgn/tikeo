<svg width="1800" height="1500" viewBox="0 0 1800 1500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tikeo 完整架构</title>
  <desc id="desc">Tikeo 完整逻辑架构图，展示入口层、服务集群、Raft 所有权、存储、可观测性、出站 Worker Tunnel、Worker 集群、SDK 处理器、插件与沙箱运行时。</desc>

