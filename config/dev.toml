[server]
listen_addr = "0.0.0.0:9090"
worker_tunnel_addr = "0.0.0.0:9998"

[storage]
database_url = "sqlite://tikeo-dev.db?mode=rwc"
timestamp_offset = "+08:00"

[cluster]
mode = "standalone"
node_id = "standalone"
peers = []

[auth]
local_login_enabled = true

[auth.api_tokens]
default_ttl_seconds = 43200
min_ttl_seconds = 300
max_ttl_seconds = 2592000

[auth.oidc]
enabled = false
scopes = ["openid", "profile", "email"]

[transport_security.http]
tls_enabled = false
mtls_required = false

[transport_security.worker_tunnel]
tls_enabled = false
mtls_required = false

[observability.logging]
level = "info"
# log_dir = "./logs"

[observability.tracing]
enabled = false
headers = []
# otlp_endpoint = "http://otel-collector:4318/v1/traces"

[alert_retry]
enabled = true
interval_seconds = 60
batch_size = 50
max_attempts = 3
backoff_seconds = 300

[script_governance]
# Optional local signature verification for script release approval tickets.
# release_signature_secret_ref = "env:TIKEO_SCRIPT_RELEASE_SECRET"
