[server]
listen_addr = "0.0.0.0:9090"
worker_tunnel_addr = "0.0.0.0:9998"

[storage]
database_url = "sqlite:///data/tikeo.db?mode=rwc"

[cluster]
mode = "standalone"
node_id = "standalone"
peers = []

[observability.logging]
level = "info"
# log_dir = "./logs"

[observability.tracing]
enabled = false
headers = []
# otlp_endpoint = "http://otel-collector:4318/v1/traces"

[alert_retry]
enabled = true
interval_seconds = 60
batch_size = 50
max_attempts = 3
backoff_seconds = 300

[alert_secrets]
allow_env_refs = true
env_prefix = "TIKEO_ALERT_SECRET_"

[notification_delivery]
enabled = true
# Set to your externally reachable Web URL so Feishu/Lark card buttons can open directly.
# Example: public_console_base_url = "https://tikeo.example.com"
interval_seconds = 60
batch_size = 50
max_attempts = 3
backoff_seconds = 300
