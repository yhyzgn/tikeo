[server]
listen_addr = "0.0.0.0:9090"
worker_tunnel_addr = "0.0.0.0:9998"

[storage]
# Raft deployments should use a production database backend.
database_url = "postgres://scheduler:scheduler@postgres:5432/scheduler"

[cluster]
# Safe raft-rs shape: mode=raft exposes node/peer metadata and validates TiKV raft-rs
# bootstrap, but does not claim leadership until the real event loop/transport is implemented.
mode = "raft"
node_id = "scheduler-0"
# transport_token should be injected from a secret in real Docker/K8s deployments,
# e.g. SCHEDULER__CLUSTER__TRANSPORT_TOKEN. Do not commit production tokens.
# transport_token = "change-me-in-secret"
peers = [
  { node_id = "scheduler-0", endpoint = "http://scheduler-0.scheduler-headless:9090" },
  { node_id = "scheduler-1", endpoint = "http://scheduler-1.scheduler-headless:9090" },
  { node_id = "scheduler-2", endpoint = "http://scheduler-2.scheduler-headless:9090" },
]
