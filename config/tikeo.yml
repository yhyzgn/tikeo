# Tikeo production configuration template.
# Mount this file to /config/tikeo.yml in containers and edit it for the target environment.
# Keep Docker/Compose .env for image tags, ports, volume names, and database container credentials only.

server:
  # HTTP API, OpenAPI, metrics, Web proxy target, and health checks.
  listen_addr: "0.0.0.0:9090"
  # Outbound Worker Tunnel listener. Workers dial this endpoint; business workers do not need inbound ports.
  worker_tunnel_addr: "0.0.0.0:9998"

storage:
  # Structured DB config avoids URL escaping problems when passwords contain '@', '/', ':', '#', etc.
  # Supported types: sqlite, postgres, mysql, cockroachdb.
  timestamp_offset: "+00:00"
  database:
    # SQLite is the default single-node mode. For PostgreSQL/MySQL, switch type and fill host/port/user/password/database.
    type: sqlite
    path: "/data/tikeo.db"
    params:
      mode: rwc

  # PostgreSQL example; replace storage.database above with this block when using docker-compose.postgres.yml:
  # database:
  #   type: postgres
  #   host: tikeo-postgres
  #   port: 5432
  #   username: tikeo
  #   password: "change-me-with-special-characters-like-@-allowed"
  #   database: tikeo
  #   params:
  #     sslmode: disable

  # MySQL example; replace storage.database above with this block when using docker-compose.mysql.yml:
  # database:
  #   type: mysql
  #   host: tikeo-mysql
  #   port: 3306
  #   username: tikeo
  #   password: "change-me-with-special-characters-like-@-allowed"
  #   database: tikeo

cluster:
  mode: standalone
  node_id: standalone
  peers: []
  scheduler_shard_map_version: 1
  scheduler_shard_count: 64
  # Required only for raft HA; inject from a Secret in real deployments.
  # transport_token: "change-me-for-raft-only"
  # Raft example:
  # mode: raft
  # node_id: tikeo-0
  # peers:
  #   - { node_id: tikeo-0, endpoint: "http://tikeo-0.tikeo-server-headless:9090" }
  #   - { node_id: tikeo-1, endpoint: "http://tikeo-1.tikeo-server-headless:9090" }
  #   - { node_id: tikeo-2, endpoint: "http://tikeo-2.tikeo-server-headless:9090" }

auth:
  local_login_enabled: true
  api_tokens:
    default_ttl_seconds: 43200
    min_ttl_seconds: 300
    max_ttl_seconds: 2592000
  oidc:
    enabled: false
    # issuer_url: "https://issuer.example.com"
    # client_id: "tikeo"
    # client_secret: "change-me"
    scopes: ["openid", "profile", "email"]

observability:
  logging:
    root:
      level: INFO
    http:
      include_headers: false
      include_body: false
      max_body_bytes: 65536
    sql:
      enabled: false
      level: DEBUG
      include_values: false
      slow_threshold_ms: 250
    channels:
      console:
        enabled: true
        level: INFO
      file:
        enabled: true
        level: INFO
        path: "${TIKEO_LOG_PATH:/logs}"
      error-file:
        enabled: true
        level: ERROR
        path: "${TIKEO_LOG_PATH:/logs}"
      elk:
        enabled: ${ELK_ENABLED:false}
        servers: "${ELK_SERVERS:elk-server:8094}"
        topic: "${ELK_TOPIC:ivs-dev}"
        level: INFO
        sasl:
          enabled: ${ELK_SASL_ENABLED:false}
          username: "${ELK_USERNAME:}"
          password: "${ELK_PASSWORD:}"
  tracing:
    enabled: false
    headers: []
    # otlp_endpoint: "http://otel-collector:4318/v1/traces"
transport_security:
  http:
    tls_enabled: false
    mtls_required: false
    # cert_path: "/config/tls/http.crt"
    # key_path: "/config/tls/http.key"
    # client_ca_path: "/config/tls/ca.crt"
  worker_tunnel:
    tls_enabled: false
    mtls_required: false
    # cert_path: "/config/tls/worker.crt"
    # key_path: "/config/tls/worker.key"
    # client_ca_path: "/config/tls/ca.crt"

alert_retry:
  enabled: true
  interval_seconds: 60
  batch_size: 50
  max_attempts: 3
  backoff_seconds: 300

alert_secrets:
  allow_env_refs: true
  env_prefix: "TIKEO_ALERT_SECRET_"

notification_delivery:
  enabled: true
  # Set to the externally reachable Web URL so notification card buttons open the console directly.
  public_console_base_url: "http://127.0.0.1:8080"
  interval_seconds: 60
  batch_size: 50
  max_attempts: 3
  backoff_seconds: 300

script_governance: {}
# To require signed script releases, replace the empty object above with:
# script_governance:
#   release_signature_secret_ref: "env:TIKEO_SCRIPT_RELEASE_SIGNATURE_SECRET"
