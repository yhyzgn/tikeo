[server]
listen_addr = "0.0.0.0:9090"
worker_tunnel_addr = "0.0.0.0:9998"

[storage]
# Override for PostgreSQL / CockroachDB deployments.
# Environment equivalent: TIKEE__STORAGE__DATABASE_URL
# PostgreSQL:  postgres://tikee:tikee@postgres:5432/tikee
# CockroachDB: postgres://root@cockroach:26257/tikee?sslmode=disable
database_url = "postgres://tikee:tikee@postgres:5432/tikee"

[cluster]
mode = "standalone"
node_id = "standalone"
peers = []
