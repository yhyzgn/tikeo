[server]
listen_addr = "0.0.0.0:9090"
worker_tunnel_addr = "0.0.0.0:9998"

[storage]
# Override for PostgreSQL / CockroachDB deployments.
# Environment equivalent: TIKEO__STORAGE__DATABASE_URL
# PostgreSQL:  postgres://tikeo:tikeo@postgres:5432/tikeo
# CockroachDB: postgres://root@cockroach:26257/tikeo?sslmode=disable
database_url = "postgres://tikeo:tikeo@postgres:5432/tikeo"

[cluster]
mode = "standalone"
node_id = "standalone"
peers = []
