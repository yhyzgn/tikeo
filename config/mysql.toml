[server]
listen_addr = "0.0.0.0:9090"
worker_tunnel_addr = "0.0.0.0:9998"

[storage]
# MySQL 8.0+ / 8.4 LTS deployments.
# Environment equivalent: TIKEO__STORAGE__DATABASE_URL
# For local compose compatibility tests:
# mysql://tikeo:tikeo@mysql:3306/tikeo
# Ensure the target database uses utf8mb4 for full Unicode payload/log support.
database_url = "mysql://tikeo:tikeo@mysql:3306/tikeo"
timestamp_offset = "+08:00"

[cluster]
mode = "standalone"
node_id = "standalone"
peers = []

[auth]
local_login_enabled = true
