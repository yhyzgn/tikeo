services:
  tikee:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${TIKEE_IMAGE:-tikee:dev}
    command: ["serve", "--config", "/app/config/container.toml"]
    ports:
      - "${TIKEE_HTTP_PORT:-9090}:9090"
      - "${TIKEE_WORKER_TUNNEL_PORT:-9998}:9998"
    volumes:
      - ${TIKEE_DATA_VOLUME:-tikee-data}:/data
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ${TIKEE_WEB_IMAGE:-tikee-web:dev}
    depends_on:
      - tikee
    ports:
      - "${TIKEE_WEB_PORT:-8080}:80"
  prometheus:
    image: prom/prometheus:v3.0.1
    profiles: ["observability"]
    depends_on:
      - tikee
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/tikee-recording-rules.yml:/etc/prometheus/tikee-recording-rules.yml:ro
    ports:
      - "${TIKEE_PROMETHEUS_PORT:-9091}:9090"

volumes:
  tikee-data:
