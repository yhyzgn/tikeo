services:
  tikee:
    build:
      context: .
      dockerfile: Dockerfile
    image: tikee:dev
    command: ["serve", "--config", "/app/config/container.toml"]
    ports:
      - "9090:9090"
      - "9998:9998"
    volumes:
      - tikee-data:/data
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: tikee-web:dev
    depends_on:
      - tikee
    ports:
      - "8080:80"

volumes:
  tikee-data:
