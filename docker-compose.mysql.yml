services:
  tikeo-server:
    container_name: tikeo-server
    image: ${TIKEO_IMAGE:-yhyzgn/tikeo-server:latest}
    command: ["serve", "--config", "/config/tikeo.yml"]
    depends_on:
      tikeo-mysql:
        condition: service_healthy
    environment:
      # Service behavior lives in ./config/tikeo.yml. Keep Compose env focused on container runtime differences only.
      TZ: ${TZ:-Asia/Shanghai}
      MIMALLOC_PURGE_DELAY: ${MIMALLOC_PURGE_DELAY:-0}
      MIMALLOC_PURGE_DECOMMITS: ${MIMALLOC_PURGE_DECOMMITS:-1}
      MIMALLOC_ABANDONED_PAGE_PURGE: ${MIMALLOC_ABANDONED_PAGE_PURGE:-1}
    ports:
      - "${TIKEO_HTTP_PORT:-9090}:9090"
      - "${TIKEO_WORKER_TUNNEL_PORT:-9998}:9998"
    volumes:
      - ./config/tikeo.yml:/config/tikeo.yml:ro
      - ./config/tls:/config/tls:ro
      - tikeo-data:/data
      - tikeo-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9090/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  tikeo-web:
    container_name: tikeo-web
    image: ${TIKEO_WEB_IMAGE:-yhyzgn/tikeo-web:latest}
    depends_on:
      tikeo-server:
        condition: service_healthy
    ports:
      - "${TIKEO_WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  tikeo-mysql:
    container_name: tikeo-mysql
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${TIKEO_MYSQL_DATABASE:-tikeo}
      MYSQL_USER: ${TIKEO_MYSQL_USER:-tikeo}
      MYSQL_PASSWORD: ${TIKEO_MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${TIKEO_MYSQL_ROOT_PASSWORD:-change-root}
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_0900_ai_ci"
    ports:
      - "${TIKEO_MYSQL_PORT:-13306}:3306"
    volumes:
      - tikeo-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s
    restart: unless-stopped

  tikeo-prometheus:
    container_name: tikeo-prometheus
    image: prom/prometheus:v3.0.1
    profiles: ["observability"]
    depends_on:
      tikeo-server:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/tikeo-recording-rules.yml:/etc/prometheus/tikeo-recording-rules.yml:ro
    ports:
      - "${TIKEO_PROMETHEUS_PORT:-9091}:9090"
    restart: unless-stopped

volumes:
  tikeo-data:
    name: ${TIKEO_DATA_VOLUME:-tikeo-data}
  tikeo-mysql-data:
    name: ${TIKEO_MYSQL_DATA_VOLUME:-tikeo-mysql-data}
  tikeo-logs:
    name: ${TIKEO_LOGS_VOLUME:-tikeo-logs}
