apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tikeo-manifest-operator
rules:
  - apiGroups: ["tikeo.io"]
    resources: ["tikeomanifests"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["tikeo.io"]
    resources: ["tikeomanifests/status"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get"]
