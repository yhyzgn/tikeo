apiVersion: v1
kind: Namespace
metadata:
  name: tikeo
---
apiVersion: v1
kind: Secret
metadata:
  name: tikeo-raft-transport
  namespace: tikeo
type: Opaque
stringData:
  transport-token: change-me-with-a-random-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: tikeo-database
  namespace: tikeo
type: Opaque
stringData:
  type: postgres
  host: postgres.example
  port: "5432"
  username: tikeo
  password: change-me
  database: tikeo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tikeo-config
  namespace: tikeo
data:
  tikeo.yml: |
    server:
      listen_addr: "0.0.0.0:9090"
      worker_tunnel_addr: "0.0.0.0:9998"
    storage:
      timestamp_offset: "+00:00"
      database:
        type: postgres
        host: override-by-secret
        port: 5432
        username: tikeo
        password: override-by-secret
        database: tikeo
    cluster:
      mode: raft
      node_id: tikeo-server-0
      peers:
        - { node_id: tikeo-server-0, endpoint: "http://tikeo-server-0.tikeo-server-headless:9090" }
        - { node_id: tikeo-server-1, endpoint: "http://tikeo-server-1.tikeo-server-headless:9090" }
        - { node_id: tikeo-server-2, endpoint: "http://tikeo-server-2.tikeo-server-headless:9090" }
---
apiVersion: v1
kind: Service
metadata:
  name: tikeo-server-headless
  namespace: tikeo
  labels:
    app.kubernetes.io/name: tikeo
    app.kubernetes.io/component: server
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: tikeo
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: tikeo
  namespace: tikeo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tikeo
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: tikeo-worker-tunnel
  namespace: tikeo
  annotations:
    tikeo.yhyzgn.com/worker-networking: "workers-connect-outbound-only"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tikeo
    app.kubernetes.io/component: server
  ports:
    - name: grpc-worker-tunnel
      port: 9998
      targetPort: worker-tunnel
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tikeo-server
  namespace: tikeo
  labels:
    app.kubernetes.io/name: tikeo
    app.kubernetes.io/component: server
spec:
  serviceName: tikeo-server-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: tikeo
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tikeo
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: tikeo
          image: yhyzgn/tikeo-server:latest
          imagePullPolicy: IfNotPresent
          args: ["serve", "--config", "/config/tikeo.yml"]
          env:
            - name: TIKEO__STORAGE__DATABASE__TYPE
              valueFrom:
                secretKeyRef:
                  name: tikeo-database
                  key: type
            - name: TIKEO__STORAGE__DATABASE__HOST
              valueFrom:
                secretKeyRef:
                  name: tikeo-database
                  key: host
            - name: TIKEO__STORAGE__DATABASE__PORT
              valueFrom:
                secretKeyRef:
                  name: tikeo-database
                  key: port
            - name: TIKEO__STORAGE__DATABASE__USERNAME
              valueFrom:
                secretKeyRef:
                  name: tikeo-database
                  key: username
            - name: TIKEO__STORAGE__DATABASE__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tikeo-database
                  key: password
            - name: TIKEO__STORAGE__DATABASE__DATABASE
              valueFrom:
                secretKeyRef:
                  name: tikeo-database
                  key: database
            - name: TIKEO__CLUSTER__MODE
              value: "raft"
            - name: TIKEO__CLUSTER__NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TIKEO__CLUSTER__TRANSPORT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tikeo-raft-transport
                  key: transport-token
          ports:
            - name: http
              containerPort: 9090
            - name: worker-tunnel
              containerPort: 9998
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: tikeo-config
