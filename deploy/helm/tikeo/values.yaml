namespaceOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

tlsDefaults:
  certFilename: tls.crt
  keyFilename: tls.key
  clientCaFilename: ca.crt

networkPolicy:
  enabled: false
  server:
    # Extra sources allowed to call the HTTP management API. Each item may contain
    # namespaceSelector and/or podSelector objects using Kubernetes NetworkPolicy shape.
    httpFrom: []
    # Extra sources allowed to establish Worker Tunnel connections. Workers still
    # connect outbound to Tikeo; this only limits who may reach the server tunnel Service.
    workerTunnelFrom: []
  web:
    ingressFrom: []

serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  path: /metrics

gatewayApi:
  enabled: false
  gateway:
    create: false
    name: tikeo-worker-tunnel
    className: ""
    annotations: {}
    listenerName: grpc-worker-tunnel
    hostname: worker-tunnel.tikeo.local
    port: 443
    tls:
      mode: Terminate
      certificateRefs: []
  workerTunnelRoute:
    enabled: true
    name: tikeo-worker-tunnel
    parentRefs: []
    hostnames:
      - worker-tunnel.tikeo.local

server:
  image:
    repository: yhyzgn/tikeo-server
    tag: v0.3.23
    pullPolicy: IfNotPresent
  replicas: 1
  cluster:
    # standalone keeps a single schedulable server process. raft renders a StatefulSet
    # with stable pod DNS and exactly one scheduling Leader at a time.
    mode: standalone
    # Defaults to <release-name>-server-headless when empty.
    peerServiceName: ""
    # Used for peer URLs in generated raft config. Keep this equal to service.port unless
    # an advanced deployment intentionally exposes a different internal HTTP port.
    peerPort: 9090
    # Required when mode=raft. The token is injected as TIKEO__CLUSTER__TRANSPORT_TOKEN.
    transportTokenExistingSecret: ""
    transportTokenSecretKey: transport-token
  pdb:
    enabled: false
    minAvailable: 1
  httpPort: 9090
  workerTunnelPort: 9998
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  storage:
    # sqlite keeps a local PVC for development/single-node installs.
    # external injects structured database fields from a Kubernetes Secret.
    mode: sqlite
    type: sqlite
    timestampOffset: "+00:00"
    sqlite:
      path: /data/tikeo.db
      mode: rwc
    external:
      host: 127.0.0.1
      port: 5432
      username: tikeo
      password: ""
      database: tikeo
      params: {}
    existingSecret: ""
    secretKeys:
      type: type
      host: host
      port: port
      username: username
      password: password
      database: database
    persistence:
      enabled: true
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 1Gi
  tls:
    http:
      enabled: false
      mtlsRequired: false
      existingSecret: ""
      clientCaSecret: ""
      mountPath: /etc/tikeo/tls/http
      clientCaMountPath: /etc/tikeo/tls/http-ca
    workerTunnel:
      enabled: false
      mtlsRequired: false
      existingSecret: ""
      clientCaSecret: ""
      mountPath: /etc/tikeo/tls/worker-tunnel
      clientCaMountPath: /etc/tikeo/tls/worker-tunnel-ca
  service:
    type: ClusterIP
    port: 9090
    annotations: {}
  workerTunnelService:
    type: ClusterIP
    port: 9998
    annotations: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: api.tikeo.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  probes:
    readiness:
      path: /readyz
      initialDelaySeconds: 3
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  image:
    repository: yhyzgn/tikeo-web
    tag: v0.3.23
    pullPolicy: IfNotPresent
  replicas: 1
  cluster:
    # standalone keeps a single schedulable server process. raft renders a StatefulSet
    # with stable pod DNS and exactly one scheduling Leader at a time.
    mode: standalone
    # Defaults to <release-name>-server-headless when empty.
    peerServiceName: ""
    # Used for peer URLs in generated raft config. Keep this equal to service.port unless
    # an advanced deployment intentionally exposes a different internal HTTP port.
    peerPort: 9090
    # Required when mode=raft. The token is injected as TIKEO__CLUSTER__TRANSPORT_TOKEN.
    transportTokenExistingSecret: ""
    transportTokenSecretKey: transport-token
  pdb:
    enabled: false
    minAvailable: 1
  port: 80
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 80
    annotations: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: tikeo.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  probes:
    readiness:
      path: /
      initialDelaySeconds: 3
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    liveness:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}
