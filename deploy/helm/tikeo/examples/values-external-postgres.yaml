# Production baseline using externally managed PostgreSQL/MySQL/CockroachDB.
# Create the secret first:
# kubectl -n tikeo create secret generic tikeo-database \
#   --from-literal=type=postgres \
#   --from-literal=host=postgres.example \
#   --from-literal=port=5432 \
#   --from-literal=username=tikeo \
#   --from-literal=password='p@ss/word:with#chars' \
#   --from-literal=database=tikeo
server:
  replicas: 2
  storage:
    mode: external
    type: postgres
    existingSecret: tikeo-database
    external:
      host: postgres.example
      port: 5432
      username: tikeo
      password: ""
      database: tikeo
      params:
        sslmode: require
    persistence:
      enabled: false
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
web:
  replicas: 2
