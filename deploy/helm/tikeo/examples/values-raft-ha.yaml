server:
  replicas: 3
  storage:
    mode: external
    type: postgres
    existingSecret: tikeo-database
    external:
      host: postgres.example
      port: 5432
      username: tikeo
      password: ""
      database: tikeo
    persistence:
      enabled: false
  cluster:
    mode: raft
    peerServiceName: tikeo-server-headless
    peerPort: 9090
    transportTokenExistingSecret: tikeo-raft-transport
    transportTokenSecretKey: transport-token
  pdb:
    enabled: true
    minAvailable: 2
