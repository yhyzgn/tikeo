apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tikeo.name" . }}-config
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
data:
  tikeo.yml: |
    server:
      listen_addr: "0.0.0.0:{{ .Values.server.httpPort }}"
      worker_tunnel_addr: "0.0.0.0:{{ .Values.server.workerTunnelPort }}"

    storage:
      timestamp_offset: {{ .Values.server.storage.timestampOffset | default "+00:00" | quote }}
      database:
        type: {{ .Values.server.storage.type | quote }}
        {{- if eq .Values.server.storage.type "sqlite" }}
        path: {{ .Values.server.storage.sqlite.path | quote }}
        params:
          mode: {{ .Values.server.storage.sqlite.mode | quote }}
        {{- else }}
        host: {{ .Values.server.storage.external.host | quote }}
        port: {{ .Values.server.storage.external.port }}
        username: {{ .Values.server.storage.external.username | quote }}
        password: {{ .Values.server.storage.external.password | quote }}
        database: {{ .Values.server.storage.external.database | quote }}
        {{- with .Values.server.storage.external.params }}
        params:
          {{- range $key, $value := . }}
          {{ $key }}: {{ $value | quote }}
          {{- end }}
        {{- end }}
        {{- end }}

    cluster:
      mode: {{ .Values.server.cluster.mode | quote }}
      {{- if eq .Values.server.cluster.mode "raft" }}
      node_id: "{{ include "tikeo.serverName" . }}-0"
      {{- else }}
      node_id: "standalone"
      peers: []
      {{- end }}
      scheduler_shard_map_version: 1
      scheduler_shard_count: 64
      {{- if eq .Values.server.cluster.mode "raft" }}
      peers:
        {{- $root := . }}
        {{- range $i := until (int .Values.server.replicas) }}
        - node_id: "{{ include "tikeo.serverName" $root }}-{{ $i }}"
          endpoint: "http://{{ include "tikeo.serverName" $root }}-{{ $i }}.{{ include "tikeo.serverHeadlessName" $root }}:{{ $root.Values.server.cluster.peerPort }}"
        {{- end }}
      {{- end }}

    transport_security:
      http:
        tls_enabled: {{ .Values.server.tls.http.enabled }}
        mtls_required: {{ .Values.server.tls.http.mtlsRequired }}
        {{- if .Values.server.tls.http.existingSecret }}
        cert_path: {{ include "tikeo.httpCertPath" . | quote }}
        key_path: {{ include "tikeo.httpKeyPath" . | quote }}
        {{- end }}
        {{- if .Values.server.tls.http.clientCaSecret }}
        client_ca_path: {{ include "tikeo.httpClientCaPath" . | quote }}
        {{- end }}
      worker_tunnel:
        tls_enabled: {{ .Values.server.tls.workerTunnel.enabled }}
        mtls_required: {{ .Values.server.tls.workerTunnel.mtlsRequired }}
        {{- if .Values.server.tls.workerTunnel.existingSecret }}
        cert_path: {{ include "tikeo.workerTunnelCertPath" . | quote }}
        key_path: {{ include "tikeo.workerTunnelKeyPath" . | quote }}
        {{- end }}
        {{- if .Values.server.tls.workerTunnel.clientCaSecret }}
        client_ca_path: {{ include "tikeo.workerTunnelClientCaPath" . | quote }}
        {{- end }}

    observability:
      logging:
        root:
          level: INFO
        http:
          include_headers: false
          include_body: false
          max_body_bytes: 65536
        sql:
          enabled: false
          level: DEBUG
          include_values: false
          slow_threshold_ms: 250
        channels:
          console:
            enabled: true
            level: INFO
          file:
            enabled: false
            level: INFO
            path: /logs
          elk:
            enabled: false
            servers: "203.83.233.63:8094,36.111.150.189:8094,106.63.7.44:8094"
            topic: "ivs-dev"
            level: INFO
            sasl:
              enabled: false
              username: ""
              password: ""
      tracing:
        enabled: false
        headers: []
