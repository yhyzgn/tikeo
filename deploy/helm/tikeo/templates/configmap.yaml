apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tikeo.name" . }}-config
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
data:
  container.toml: |
    [server]
    listen_addr = "0.0.0.0:{{ .Values.server.httpPort }}"
    worker_tunnel_addr = "0.0.0.0:{{ .Values.server.workerTunnelPort }}"

    [storage]
    database_url = "{{ .Values.server.storage.databaseUrl }}"

    [cluster]
    mode = "{{ .Values.server.cluster.mode }}"
    {{- if eq .Values.server.cluster.mode "raft" }}
    # Runtime node_id is injected by TIKEO__CLUSTER__NODE_ID from Kubernetes metadata.name.
    node_id = "{{ include "tikeo.serverName" . }}-0"
    peers = [
    {{- $root := . }}
    {{- range $i := until (int .Values.server.replicas) }}
      { node_id = "{{ include "tikeo.serverName" $root }}-{{ $i }}", endpoint = "http://{{ include "tikeo.serverName" $root }}-{{ $i }}.{{ include "tikeo.serverHeadlessName" $root }}:{{ $root.Values.server.cluster.peerPort }}" },
    {{- end }}
    ]
    {{- else }}
    node_id = "standalone"
    {{- end }}

    [transport_security.http]
    tls_enabled = {{ .Values.server.tls.http.enabled }}
    mtls_required = {{ .Values.server.tls.http.mtlsRequired }}
    {{- if .Values.server.tls.http.existingSecret }}
    cert_path = "{{ include "tikeo.httpCertPath" . }}"
    key_path = "{{ include "tikeo.httpKeyPath" . }}"
    {{- end }}
    {{- if .Values.server.tls.http.clientCaSecret }}
    client_ca_path = "{{ include "tikeo.httpClientCaPath" . }}"
    {{- end }}

    [transport_security.worker_tunnel]
    tls_enabled = {{ .Values.server.tls.workerTunnel.enabled }}
    mtls_required = {{ .Values.server.tls.workerTunnel.mtlsRequired }}
    {{- if .Values.server.tls.workerTunnel.existingSecret }}
    cert_path = "{{ include "tikeo.workerTunnelCertPath" . }}"
    key_path = "{{ include "tikeo.workerTunnelKeyPath" . }}"
    {{- end }}
    {{- if .Values.server.tls.workerTunnel.clientCaSecret }}
    client_ca_path = "{{ include "tikeo.workerTunnelClientCaPath" . }}"
    {{- end }}
