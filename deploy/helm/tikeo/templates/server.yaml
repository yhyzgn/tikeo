apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tikeo.name" . }}-data
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.server.storage.size | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tikeo.name" . }}-server
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tikeo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tikeo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: tikeo
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args: ["serve", "--config", "/config/container.toml"]
          ports:
            - name: http
              containerPort: {{ .Values.server.httpPort }}
            - name: worker-tunnel
              containerPort: {{ .Values.server.workerTunnelPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "tikeo.name" . }}-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tikeo.name" . }}-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tikeo.name" . }}
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "tikeo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.httpPort }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tikeo.name" . }}-worker-tunnel
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
  annotations:
    tikeo.yhyzgn.com/worker-networking: "workers-connect-outbound-only"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "tikeo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
  ports:
    - name: grpc-worker-tunnel
      port: {{ .Values.server.workerTunnelPort }}
      targetPort: worker-tunnel
