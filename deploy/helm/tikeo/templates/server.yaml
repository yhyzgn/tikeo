{{- if and (eq .Values.server.storage.mode "sqlite") .Values.server.storage.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tikeo.name" . }}-data
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.server.storage.persistence.accessModes | nindent 4 }}
  {{- if .Values.server.storage.persistence.storageClass }}
  storageClassName: {{ .Values.server.storage.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.server.storage.persistence.size | quote }}
---
{{- end }}
{{- $raftEnabled := eq .Values.server.cluster.mode "raft" }}
apiVersion: apps/v1
kind: {{ ternary "StatefulSet" "Deployment" $raftEnabled }}
metadata:
  name: {{ include "tikeo.serverName" . }}
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if $raftEnabled }}
  serviceName: {{ include "tikeo.serverHeadlessName" . }}
  {{- end }}
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tikeo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tikeo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: server
      {{- with .Values.server.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tikeo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tikeo
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args: ["serve", "--config", "/config/tikeo.toml"]
          {{- if or (and (eq .Values.server.storage.mode "external") .Values.server.storage.existingSecret) $raftEnabled }}
          env:
            {{- if and (eq .Values.server.storage.mode "external") .Values.server.storage.existingSecret }}
            - name: TIKEO__STORAGE__DATABASE__TYPE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.storage.existingSecret | quote }}
                  key: {{ .Values.server.storage.secretKeys.type | quote }}
            - name: TIKEO__STORAGE__DATABASE__HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.storage.existingSecret | quote }}
                  key: {{ .Values.server.storage.secretKeys.host | quote }}
            - name: TIKEO__STORAGE__DATABASE__PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.storage.existingSecret | quote }}
                  key: {{ .Values.server.storage.secretKeys.port | quote }}
            - name: TIKEO__STORAGE__DATABASE__USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.storage.existingSecret | quote }}
                  key: {{ .Values.server.storage.secretKeys.username | quote }}
            - name: TIKEO__STORAGE__DATABASE__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.storage.existingSecret | quote }}
                  key: {{ .Values.server.storage.secretKeys.password | quote }}
            - name: TIKEO__STORAGE__DATABASE__DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.storage.existingSecret | quote }}
                  key: {{ .Values.server.storage.secretKeys.database | quote }}
            {{- end }}
            {{- if $raftEnabled }}
            - name: TIKEO__CLUSTER__MODE
              value: "raft"
            - name: TIKEO__CLUSTER__NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TIKEO__CLUSTER__TRANSPORT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "server.cluster.transportTokenExistingSecret is required when server.cluster.mode=raft" .Values.server.cluster.transportTokenExistingSecret | quote }}
                  key: {{ .Values.server.cluster.transportTokenSecretKey | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.httpPort }}
            - name: worker-tunnel
              containerPort: {{ .Values.server.workerTunnelPort }}
          readinessProbe:
            httpGet:
              path: {{ .Values.server.probes.readiness.path | quote }}
              port: http
              {{- if .Values.server.tls.http.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.server.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.server.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.server.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.probes.liveness.path | quote }}
              port: http
              {{- if .Values.server.tls.http.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: {{ .Values.server.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.server.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.server.probes.liveness.failureThreshold }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if eq .Values.server.storage.mode "sqlite" }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.server.tls.http.existingSecret }}
            - name: http-tls
              mountPath: {{ .Values.server.tls.http.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.server.tls.http.clientCaSecret }}
            - name: http-client-ca
              mountPath: {{ .Values.server.tls.http.clientCaMountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.server.tls.workerTunnel.existingSecret }}
            - name: worker-tunnel-tls
              mountPath: {{ .Values.server.tls.workerTunnel.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.server.tls.workerTunnel.clientCaSecret }}
            - name: worker-tunnel-client-ca
              mountPath: {{ .Values.server.tls.workerTunnel.clientCaMountPath | quote }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "tikeo.name" . }}-config
        {{- if eq .Values.server.storage.mode "sqlite" }}
        - name: data
          {{- if .Values.server.storage.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "tikeo.name" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.server.tls.http.existingSecret }}
        - name: http-tls
          secret:
            secretName: {{ .Values.server.tls.http.existingSecret | quote }}
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        {{- end }}
        {{- if .Values.server.tls.http.clientCaSecret }}
        - name: http-client-ca
          secret:
            secretName: {{ .Values.server.tls.http.clientCaSecret | quote }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
        {{- if .Values.server.tls.workerTunnel.existingSecret }}
        - name: worker-tunnel-tls
          secret:
            secretName: {{ .Values.server.tls.workerTunnel.existingSecret | quote }}
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        {{- end }}
        {{- if .Values.server.tls.workerTunnel.clientCaSecret }}
        - name: worker-tunnel-client-ca
          secret:
            secretName: {{ .Values.server.tls.workerTunnel.clientCaSecret | quote }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if eq .Values.server.cluster.mode "raft" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tikeo.serverHeadlessName" . }}
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: {{ include "tikeo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.cluster.peerPort }}
      targetPort: http
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tikeo.name" . }}
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
  {{- with .Values.server.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.server.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "tikeo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tikeo.name" . }}-worker-tunnel
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
  annotations:
    tikeo.yhyzgn.com/worker-networking: "workers-connect-outbound-only"
    {{- with .Values.server.workerTunnelService.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.server.workerTunnelService.type }}
  selector:
    app.kubernetes.io/name: {{ include "tikeo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
  ports:
    - name: grpc-worker-tunnel
      port: {{ .Values.server.workerTunnelService.port }}
      targetPort: worker-tunnel
{{- if .Values.server.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tikeo.name" . }}-server
  namespace: {{ include "tikeo.namespace" . }}
  labels:
    {{- include "tikeo.labels" . | nindent 4 }}
  {{- with .Values.server.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.server.ingress.className }}
  ingressClassName: {{ .Values.server.ingress.className | quote }}
  {{- end }}
  {{- with .Values.server.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.server.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "tikeo.name" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
