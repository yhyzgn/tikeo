name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SERVER_IMAGE_NAME: tikee-server
  WEB_IMAGE_NAME: tikee-web

jobs:
  server-binaries:
    name: Server binary / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: tikee
          - target: x86_64-apple-darwin
            os: macos-13
            archive_ext: tar.gz
            binary_name: tikee
          - target: aarch64-apple-darwin
            os: macos-14
            archive_ext: tar.gz
            binary_name: tikee
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_name: tikee.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build server binary
        run: cargo build --release --locked --bin tikee --target ${{ matrix.target }}
      - name: Stage server release payload
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="tikee-server-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/$PKG/config" "dist/$PKG/deploy"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$PKG/${{ matrix.binary_name }}"
          cp README.md "dist/$PKG/README.md"
          cp -R config/. "dist/$PKG/config/"
          cp deploy/compose/tikee.env.example "dist/$PKG/deploy/tikee.env.example"
          cp docker-compose.yml "dist/$PKG/docker-compose.yml"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && 7z a "$PKG.zip" "$PKG")
          else
            tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  web-dist:
    name: Web dist package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Test web
        working-directory: web
        run: bun test
      - name: Build web
        working-directory: web
        run: bun run build
      - name: Stage web release payload
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="tikee-web-dist-${VERSION}"
          mkdir -p "dist/$PKG"
          cp -R web/dist "dist/$PKG/dist"
          cp -R web/nginx "dist/$PKG/nginx"
          cp web/Dockerfile "dist/$PKG/Dockerfile"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v4
        with:
          name: tikee-web-dist
          path: dist/*.tar.gz
          if-no-files-found: error

  java-sdk:
    name: Java SDK package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test and build Java SDK
        working-directory: sdks/java
        run: ./gradlew test jar sourcesJar
      - name: Package Java SDK jars
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="java-sdk-${VERSION}"
          mkdir -p "dist/$PKG"
          cp -R sdks/java/README.md sdks/java/settings.gradle.kts sdks/java/build.gradle.kts sdks/java/gradle.properties "dist/$PKG/"
          find sdks/java -path '*/build/libs/*.jar' -type f -print -exec cp {} "dist/$PKG/" \;
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v4
        with:
          name: java-sdk
          path: dist/*.tar.gz
          if-no-files-found: error

  rust-sdk:
    name: Rust SDK package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust/tikee -> target
      - name: Test Rust SDK
        run: cargo test --manifest-path sdks/rust/tikee/Cargo.toml --all-features
      - name: Package Rust SDK crate
        run: cargo package --manifest-path sdks/rust/tikee/Cargo.toml --allow-dirty
      - name: Stage Rust SDK release payload
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="rust-sdk-${VERSION}"
          mkdir -p "dist/$PKG"
          cp sdks/rust/tikee/target/package/*.crate "dist/$PKG/"
          cp -R sdks/rust/README.md sdks/rust/tikee/README.md "dist/$PKG/"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v4
        with:
          name: rust-sdk
          path: dist/*.tar.gz
          if-no-files-found: error

  docker:
    name: Docker Hub images
    runs-on: ubuntu-latest
    needs: [server-binaries, web-dist, java-sdk, rust-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker metadata / server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVER_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Docker metadata / web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

  github-release:
    name: GitHub Release upload
    runs-on: ubuntu-latest
    needs: [server-binaries, web-dist, java-sdk, rust-sdk, docker]
    if: ${{ always() && !cancelled() && !failure() }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: find release-assets -type f -maxdepth 2 -print | sort
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/*
