name: Publish / Rust SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish Rust SDK, for example v0.1.123'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: rust-sdk-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Rust SDK to crates.io and GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust/tikeo -> target
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Set Rust SDK version from tag
        run: |
          python - <<'PY'
          from pathlib import Path
          version = '${{ steps.version.outputs.version }}'
          p = Path('sdks/rust/tikeo/Cargo.toml')
          s = p.read_text()
          import re
          s = re.sub(r'(?m)^version = "[^"]+"', f'version = "{version}"', s, count=1)
          p.write_text(s)
          PY
      - name: Test Rust SDK
        run: cargo test --manifest-path sdks/rust/tikeo/Cargo.toml --all-features
      - name: Package Rust SDK crate
        run: cargo package --manifest-path sdks/rust/tikeo/Cargo.toml --allow-dirty
      - name: Publish Rust SDK to crates.io
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --manifest-path sdks/rust/tikeo/Cargo.toml --token "$CRATES_IO_TOKEN" --allow-dirty
      - name: Stage Rust SDK release payload
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PKG="rust-sdk-${VERSION}"
          mkdir -p "dist/$PKG"
          cp sdks/rust/tikeo/target/package/*.crate "dist/$PKG/"
          cp -R sdks/rust/README.md sdks/rust/tikeo/README.md "dist/$PKG/"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - name: Upload Rust SDK package to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') || startsWith(steps.version.outputs.tag, 'v0.') }}
          files: dist/*.tar.gz
