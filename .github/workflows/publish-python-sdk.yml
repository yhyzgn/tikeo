name: Publish / Python SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach Python SDK package to, for example v0.1.0'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: python-sdk-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Package and optionally publish Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            sdks/python/tikee/pyproject.toml
            examples/python/worker-demo/pyproject.toml
      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install -e sdks/python/tikee[test]
          python -m pip install -e examples/python/worker-demo[test]
      - name: Test Python SDK and demo
        run: python -m pytest sdks/python/tikee/tests examples/python/worker-demo/tests -q
      - name: Python demo dry-run smoke
        env:
          TIKEE_WORKER_DRY_RUN: '1'
          TIKEE_SANDBOX_AUTO_INSTALL: '0'
        run: python -m tikee_python_worker_demo
      - name: Build Python SDK distributions
        run: python -m build sdks/python/tikee
      - name: Verify Python SDK distributions
        run: python -m twine check sdks/python/tikee/dist/*
      - name: Stage Python SDK release payload
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          PKG="python-sdk-${VERSION}"
          mkdir -p "dist/$PKG"
          cp sdks/python/tikee/dist/* "dist/$PKG/"
          cp -R sdks/python/tikee/README.md sdks/python/tikee/pyproject.toml "dist/$PKG/"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - name: Publish Python SDK to PyPI when configured
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "PYPI_API_TOKEN is not configured; skipping PyPI publish."
            exit 0
          fi
          python -m twine upload --non-interactive --username __token__ --password "$PYPI_API_TOKEN" sdks/python/tikee/dist/*
      - name: Upload Python SDK package to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref_name || inputs.tag, '-') }}
          files: dist/*.tar.gz
