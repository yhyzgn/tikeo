name: Release candidate / cross-language Worker soak

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref, branch, or tag to test. Defaults to the current ref.'
        required: false
        type: string
      soak_seconds:
        description: 'Cross-language soak duration in seconds.'
        required: true
        default: '120'
        type: string
      soak_interval_seconds:
        description: 'Seconds between soak dispatch rounds.'
        required: true
        default: '10'
        type: string
      rebuild_server:
        description: 'Rebuild the tikeo server binary before running the smoke.'
        required: true
        default: true
        type: boolean
      skip_web:
        description: 'Skip the Web dev server route smoke to focus on Worker dispatch.'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

concurrency:
  group: rc-cross-language-worker-soak-${{ github.event_name == 'workflow_dispatch' && (inputs.ref || github.ref) || github.ref }}
  cancel-in-progress: false

jobs:
  soak:
    name: Cross-language Worker soak
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || github.ref) || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            sdks/go/tikeo/go.sum
            examples/go/worker-demo/go.sum
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            sdks/python/tikeo/pyproject.toml
            examples/python/worker-demo/pyproject.toml
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Install Python worker demo dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e sdks/python/tikeo
          python -m pip install -e examples/python/worker-demo
      - name: Install Node.js worker demo dependencies
        working-directory: examples/nodejs/worker-demo
        run: bun install --frozen-lockfile
      - name: Run cross-language Worker release-candidate soak
        env:
          TIKEO_CROSS_SKIP_WEB: ${{ inputs.skip_web && '1' || '0' }}
          TIKEO_CROSS_REBUILD_SERVER: ${{ inputs.rebuild_server && '1' || '0' }}
          TIKEO_CROSS_SOAK_SECONDS: ${{ inputs.soak_seconds }}
          TIKEO_CROSS_SOAK_INTERVAL_SECONDS: ${{ inputs.soak_interval_seconds }}
        run: deploy/smoke/cross-language-worker-parity-smoke.sh
      - name: Summarize soak evidence
        if: always()
        run: |
          set -euo pipefail
          SUMMARY="$(find .dev/reports -name '*-soak-summary.json' -print -quit 2>/dev/null || true)"
          if [ -n "$SUMMARY" ]; then
            echo "## Cross-language Worker soak" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Summary: \`$SUMMARY\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            python3 -c 'import json,sys; s=json.load(open(sys.argv[1], encoding="utf-8")); keys=["rounds","totalDispatches","succeeded","failed","maxDurationSeconds","averageDurationSeconds","maxQueuePending","maxOutboxPending","minWorkersOnline","verdict"]; [print(f"- **{k}**: `{s.get(k)}`") for k in keys]' "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No soak summary was found." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload cross-language Worker soak evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cross-language-worker-soak
          path: .dev/reports/cross-language-workers-*/*
          if-no-files-found: error
