name: Publish / Java SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish Java SDK, for example v0.1.123'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: java-sdk-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Java SDK to Maven Central and GitHub Release
    runs-on: ubuntu-latest
    environment:
      name: maven-central-net-tikeo
      url: https://central.sonatype.com/namespace/net.tikeo
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Set Java SDK version from tag
        run: python scripts/set-release-version.py "${{ steps.version.outputs.version }}" --tag "${{ steps.version.outputs.tag }}" --scope java
      - name: Test Java SDK
        working-directory: sdks/java
        run: ./gradlew test --no-daemon
      - name: Normalize Maven signing key
        env:
          MAVEN_SIGNING_KEY_RAW: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_KEY_ID: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("MAVEN_SIGNING_KEY_RAW", "").strip()
          if not raw:
              raise SystemExit("MAVEN_SIGNING_KEY is empty")

          candidates = []
          if "\\n" in raw:
              candidates.append(raw.replace("\\n", "\n"))
          candidates.append(raw)
          try:
              decoded = base64.b64decode(raw, validate=True).decode("utf-8")
              if "\\n" in decoded:
                  candidates.append(decoded.replace("\\n", "\n"))
              candidates.append(decoded)
          except Exception:
              pass

          key = None
          end_marker = "-----END PGP PRIVATE KEY BLOCK-----"
          for candidate in candidates:
              normalized = candidate.replace("\r\n", "\n").replace("\r", "\n").strip()
              begin = normalized.find("-----BEGIN PGP PRIVATE KEY BLOCK-----")
              end = normalized.find(end_marker)
              if begin < 0 or end < 0:
                  continue
              end += len(end_marker)
              normalized = normalized[begin:end].strip()
              if "\\n" in normalized or "\n" not in normalized:
                  continue
              key = normalized
              break
          if key is None:
              raise SystemExit("MAVEN_SIGNING_KEY must contain a newline-normalized ASCII-armored PGP private key or base64 of it")

          Path("/tmp/tikeo-maven-signing-key.raw.asc").write_text(key + "\n", encoding="utf-8")
          print(f"Maven signing key raw armor bytes: {len(key.encode('utf-8'))}")
          PY
          export GNUPGHOME=/tmp/tikeo-maven-gnupg
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          set +e
          gpg --batch --import /tmp/tikeo-maven-signing-key.raw.asc 2>/tmp/tikeo-gpg-import-warnings.log
          GPG_IMPORT_STATUS=$?
          set -e
          mapfile -t FINGERPRINTS < <(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10}')
          if [ "${#FINGERPRINTS[@]}" -eq 0 ]; then
            echo "MAVEN_SIGNING_KEY did not import as a secret key; gpg status=$GPG_IMPORT_STATUS" >&2
            sed 's/.*/gpg import warning redacted/' /tmp/tikeo-gpg-import-warnings.log >&2 || true
            exit 1
          fi
          if [ "$GPG_IMPORT_STATUS" -ne 0 ]; then
            echo "gpg reported non-fatal import warnings while a secret key was imported; continuing clean re-export."
          fi
          SELECTED_FPR="${FINGERPRINTS[0]}"
          if [ -n "${MAVEN_SIGNING_KEY_ID:-}" ]; then
            for fpr in "${FINGERPRINTS[@]}"; do
              case "$fpr" in
                *"$MAVEN_SIGNING_KEY_ID") SELECTED_FPR="$fpr" ;;
              esac
            done
          fi
          if [ -z "${MAVEN_SIGNING_PASSWORD:-}" ]; then
            echo "MAVEN_SIGNING_PASSWORD is empty; cannot re-export encrypted Maven signing private key" >&2
            exit 1
          fi
          gpg --batch --yes --pinentry-mode loopback --passphrase "$MAVEN_SIGNING_PASSWORD" --armor --export-secret-keys "$SELECTED_FPR" > /tmp/tikeo-maven-signing-key.clean.asc
          if ! grep -q 'BEGIN PGP PRIVATE KEY BLOCK' /tmp/tikeo-maven-signing-key.clean.asc; then
            echo "failed to re-export a clean Maven signing private key" >&2
            exit 1
          fi
          marker="TIKEO_MAVEN_SIGNING_KEY"
          {
            echo "ORG_GRADLE_PROJECT_signingInMemoryKey<<$marker"
            cat /tmp/tikeo-maven-signing-key.clean.asc
            echo "$marker"
          } >> "$GITHUB_ENV"
          echo "Maven signing key imported and re-exported for in-memory Gradle signing"
      - name: Validate Maven signing key metadata
        env:
          MAVEN_SIGNING_KEY_ID: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          key = os.environ.get("ORG_GRADLE_PROJECT_signingInMemoryKey", "")
          key_id = os.environ.get("MAVEN_SIGNING_KEY_ID", "")
          password = os.environ.get("MAVEN_SIGNING_PASSWORD", "")
          if "BEGIN PGP PRIVATE KEY BLOCK" not in key:
              raise SystemExit("normalized Maven signing key is not an ASCII-armored private key")
          if not password:
              raise SystemExit("MAVEN_SIGNING_PASSWORD is empty")
          key_path = Path("/tmp/tikeo-maven-signing-key.asc")
          key_path.write_text(key, encoding="utf-8")
          print(f"Maven signing key private block present: yes")
          print(f"Maven signing password present: yes")
          print(f"MAVEN_SIGNING_KEY_ID configured: {'yes' if key_id else 'no'} length={len(key_id)}")
          print(f"Maven signing key armor bytes: {len(key.encode('utf-8'))}")
          PY
          set +e
          GPG_METADATA=$(gpg --batch --show-keys --with-colons /tmp/tikeo-maven-signing-key.asc 2>/tmp/tikeo-gpg-warnings.log)
          GPG_STATUS=$?
          set -e
          printf '%s\n' "$GPG_METADATA" \
            | awk -F: '/^(sec|fpr|uid):/ { if ($1 == "sec") print "gpg secret key algorithm=" $4 " keyid=" $5; else if ($1 == "fpr") print "gpg fingerprint=" $10; else if ($1 == "uid") print "gpg uid present" }'
          if ! printf '%s\n' "$GPG_METADATA" | grep -q '^sec:'; then
            echo "No secret key metadata found in MAVEN_SIGNING_KEY; gpg status=$GPG_STATUS" >&2
            sed 's/.*/gpg warning redacted/' /tmp/tikeo-gpg-warnings.log >&2 || true
            exit 1
          fi
          if [ "$GPG_STATUS" -ne 0 ]; then
            echo "gpg reported non-fatal armor warnings while metadata was still readable; continuing to Gradle signing validation."
          fi
      - name: Publish Java SDK to Maven Central
        working-directory: sdks/java
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon
      - name: Package Java SDK jars
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PKG="java-sdk-${VERSION}"
          mkdir -p "dist/$PKG"
          cp -R sdks/java/README.md sdks/java/LICENSE sdks/java/settings.gradle.kts sdks/java/build.gradle.kts sdks/java/gradle.properties "dist/$PKG/"
          find sdks/java -path '*/build/libs/*.jar' -type f -print -exec cp {} "dist/$PKG/" \;
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - name: Upload Java SDK package to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: dist/*.tar.gz
