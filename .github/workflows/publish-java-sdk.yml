name: Publish / Java SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish Java SDK, for example v0.1.123'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: java-sdk-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Java SDK to Maven Central and GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Test Java SDK
        working-directory: sdks/java
        run: ./gradlew test --no-daemon -PtikeoVersion=${{ steps.version.outputs.version }}
      - name: Normalize Maven signing key
        env:
          MAVEN_SIGNING_KEY_RAW: ${{ secrets.MAVEN_SIGNING_KEY }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("MAVEN_SIGNING_KEY_RAW", "").strip()
          if not raw:
              raise SystemExit("MAVEN_SIGNING_KEY is empty")

          candidates = [raw]
          if "\\n" in raw:
              candidates.append(raw.replace("\\n", "\n"))
          try:
              decoded = base64.b64decode(raw, validate=True).decode("utf-8")
              candidates.append(decoded)
              if "\\n" in decoded:
                  candidates.append(decoded.replace("\\n", "\n"))
          except Exception:
              pass

          key = next((candidate.strip() for candidate in candidates if "BEGIN PGP PRIVATE KEY BLOCK" in candidate), None)
          if key is None:
              raise SystemExit("MAVEN_SIGNING_KEY must contain an ASCII-armored PGP private key or base64 of it")

          marker = "TIKEO_MAVEN_SIGNING_KEY"
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env:
              env.write(f"ORG_GRADLE_PROJECT_signingInMemoryKey<<{marker}\n")
              env.write(key)
              env.write(f"\n{marker}\n")
          print("Maven signing key normalized for in-memory Gradle signing")
          PY
      - name: Publish Java SDK to Maven Central
        working-directory: sdks/java
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon -PtikeoVersion=${{ steps.version.outputs.version }}
      - name: Package Java SDK jars
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PKG="java-sdk-${VERSION}"
          mkdir -p "dist/$PKG"
          cp -R sdks/java/README.md sdks/java/settings.gradle.kts sdks/java/build.gradle.kts sdks/java/gradle.properties "dist/$PKG/"
          find sdks/java -path '*/build/libs/*.jar' -type f -print -exec cp {} "dist/$PKG/" \;
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - name: Upload Java SDK package to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: dist/*.tar.gz
