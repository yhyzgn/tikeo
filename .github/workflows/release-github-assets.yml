name: Release / GitHub assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to, for example v0.1.123'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  server-binaries:
    name: Server binary / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: tikeo
            asset_ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            binary_name: tikeo
            asset_ext: ""
          - target: x86_64-apple-darwin
            os: macos-15-intel
            binary_name: tikeo
            asset_ext: ""
          - target: aarch64-apple-darwin
            os: macos-14
            binary_name: tikeo
            asset_ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: tikeo.exe
            asset_ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            binary_name: tikeo.exe
            asset_ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned protoc
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_VERSION=21.12
          case "${{ runner.os }}:${{ matrix.target }}" in
            Linux:x86_64-*)
              PROTOC_ASSET="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
              PROTOC_BIN_NAME="protoc"
              ;;
            Linux:aarch64-*)
              PROTOC_ASSET="protoc-${PROTOC_VERSION}-linux-aarch_64.zip"
              PROTOC_BIN_NAME="protoc"
              ;;
            macOS:*)
              PROTOC_ASSET="protoc-${PROTOC_VERSION}-osx-universal_binary.zip"
              PROTOC_BIN_NAME="protoc"
              ;;
            Windows:*)
              PROTOC_ASSET="protoc-${PROTOC_VERSION}-win64.zip"
              PROTOC_BIN_NAME="protoc.exe"
              ;;
            *)
              echo "unsupported runner OS/target: ${{ runner.os }}:${{ matrix.target }}" >&2
              exit 1
              ;;
          esac
          PROTOC_DIR="$PWD/.protoc-${PROTOC_VERSION}"
          rm -rf "$PROTOC_DIR"
          mkdir -p "$PROTOC_DIR"
          curl -fsSLo protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ASSET}"
          unzip -q protoc.zip -d "$PROTOC_DIR"
          PROTOC_BIN="$PROTOC_DIR/bin/$PROTOC_BIN_NAME"
          if [ ! -x "$PROTOC_BIN" ]; then
            echo "downloaded protoc binary is missing or not executable: $PROTOC_BIN" >&2
            find "$PROTOC_DIR" -maxdepth 3 -type f -print >&2
            exit 1
          fi
          PROTOC_ENV="$PROTOC_BIN"
          PROTOC_PATH_ENTRY="$PROTOC_DIR/bin"
          if [ "${{ runner.os }}" = "Windows" ]; then
            PROTOC_ENV="$(cygpath -w "$PROTOC_BIN")"
            PROTOC_PATH_ENTRY="$(cygpath -w "$PROTOC_DIR/bin")"
          fi
          echo "$PROTOC_PATH_ENTRY" >> "$GITHUB_PATH"
          echo "PROTOC=$PROTOC_ENV" >> "$GITHUB_ENV"
          "$PROTOC_BIN" --version
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check release version consistency
        shell: bash
        run: python scripts/check-release-version.py "${{ steps.version.outputs.version }}" --tag "${{ steps.version.outputs.tag }}"
      - name: Verify release tag commit
        id: buildmeta
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          TAG_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "release tag $RELEASE_TAG points to $TAG_SHA but checkout HEAD is $HEAD_SHA" >&2
            exit 1
          fi
          echo "git_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Build server binary
        shell: bash
        run: |
          set -euo pipefail
          echo "Using PROTOC=$PROTOC"
          cargo build --release --locked --bin tikeo --target ${{ matrix.target }}
      - name: Stage server release binary
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          ASSET="tikeo-server-${VERSION}-${{ matrix.target }}${{ matrix.asset_ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$ASSET"
          chmod +x "dist/$ASSET" || true
      - uses: actions/upload-artifact@v6
        with:
          name: server-${{ matrix.target }}
          path: dist/tikeo-server-*
          if-no-files-found: error

  migrate-cli-binaries:
    name: Migration CLI / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: x86_64-apple-darwin
            os: macos-15-intel
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: aarch64-apple-darwin
            os: macos-14
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: tikeo-migrate.exe
            asset_ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            binary_name: tikeo-migrate.exe
            asset_ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check release version consistency
        shell: bash
        run: python scripts/check-release-version.py "${{ steps.version.outputs.version }}" --tag "${{ steps.version.outputs.tag }}"
      - name: Verify release tag commit
        id: buildmeta
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          TAG_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "release tag $RELEASE_TAG points to $TAG_SHA but checkout HEAD is $HEAD_SHA" >&2
            exit 1
          fi
          echo "git_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Test migration CLI
        shell: bash
        run: cargo test -p tikeo-migrate --locked --target ${{ matrix.target }}
      - name: Build migration CLI binary
        shell: bash
        run: cargo build -p tikeo-migrate --release --locked --bin tikeo-migrate --target ${{ matrix.target }}
      - name: Stage migration CLI release binary
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          ASSET="tikeo-migrate-${VERSION}-${{ matrix.target }}${{ matrix.asset_ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$ASSET"
          chmod +x "dist/$ASSET" || true
      - uses: actions/upload-artifact@v6
        with:
          name: tikeo-migrate-${{ matrix.target }}
          path: dist/tikeo-migrate-*
          if-no-files-found: error

  web-dist:
    name: Web dist package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Test web
        working-directory: web
        run: bun run test
      - name: Build web
        working-directory: web
        run: bun run build
      - name: Stage web release payload
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          PKG="tikeo-web-dist-${VERSION}"
          mkdir -p "dist/$PKG"
          cp -R web/dist "dist/$PKG/dist"
          cp -R web/nginx "dist/$PKG/nginx"
          cp web/Dockerfile "dist/$PKG/Dockerfile"
          cp web/LICENSE "dist/$PKG/LICENSE"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v6
        with:
          name: tikeo-web-dist
          path: dist/*.tar.gz
          if-no-files-found: error

  deploy-assets:
    name: Deploy tooling / Terraform, K8s, Helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            deploy/terraform/provider/go.sum
            deploy/k8s/operator/go.sum
      - name: Install Helm
        shell: bash
        run: |
          set -euo pipefail
          HELM_VERSION=3.19.2
          curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o helm.tar.gz
          tar -xzf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm
          helm version --short
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Test Terraform provider and K8s operator
        run: |
          set -euo pipefail
          (cd deploy/terraform/provider && go test ./... -count=1)
          (cd deploy/k8s/operator && go test ./... -count=1)
      - name: Build Terraform provider binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )
          for entry in "${targets[@]}"; do
            set -- $entry
            os="$1"; arch="$2"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            out="terraform-provider-tikeo_v${VERSION}_${os}_${arch}${ext}"
            (cd deploy/terraform/provider && GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "../../../dist/$out" .)
            chmod +x "dist/$out" || true
          done
      - name: Build K8s operator binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )
          for entry in "${targets[@]}"; do
            set -- $entry
            os="$1"; arch="$2"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            pkg=".tmp-tikeo-operator-${VERSION}-${os}-${arch}"
            mkdir -p "dist/$pkg"
            (cd deploy/k8s/operator && GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "../../../dist/$pkg/tikeo-operator${ext}" ./cmd/tikeo-operator)
            cp deploy/k8s/operator/README.md "dist/$pkg/README.md"
            cp deploy/k8s/crd/tikeo-manifest-crd.yaml "dist/$pkg/tikeo-manifest-crd.yaml"
            ASSET="tikeo-operator-${VERSION}-${os}-${arch}${ext}"
            cp "dist/$pkg/tikeo-operator${ext}" "dist/$ASSET"
            chmod +x "dist/$ASSET" || true
            rm -rf "dist/$pkg"
          done
      - name: Package K8s manifests, compose files, and Helm chart
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          python scripts/check-release-version.py "$VERSION" --tag "$RELEASE_TAG"
          TAG_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "release tag $RELEASE_TAG points to $TAG_SHA but checkout HEAD is $HEAD_SHA" >&2
            exit 1
          fi
          helm lint deploy/helm/tikeo
          helm package deploy/helm/tikeo --destination dist
          cp deploy/k8s/tikeo.yaml "dist/tikeo-k8s-manifest-${VERSION}.yaml"
          cp deploy/k8s/crd/tikeo-manifest-crd.yaml "dist/tikeo-manifest-crd-${VERSION}.yaml"
          cp docker-compose.yml "dist/tikeo-docker-compose-sqlite-${VERSION}.yml"
          cp docker-compose.postgres.yml "dist/tikeo-docker-compose-postgres-${VERSION}.yml"
          cp docker-compose.mysql.yml "dist/tikeo-docker-compose-mysql-${VERSION}.yml"
          tar -C deploy -czf "dist/tikeo-deploy-sources-${VERSION}.tar.gz" terraform k8s helm gitops systemd compose bare-metal README.md
      - uses: actions/upload-artifact@v6
        with:
          name: deploy-assets
          path: |
            dist/*.tar.gz
            dist/*.tgz
            dist/*.yaml
            dist/*.yml
            dist/terraform-provider-tikeo_*
            dist/tikeo-operator-*
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    environment:
      name: github-release
      url: https://github.com/yhyzgn/tikeo/releases/tag/${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    needs: [server-binaries, migrate-cli-binaries, web-dist, deploy-assets]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort
      - name: Generate product release notes
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          python scripts/generate-release-notes.py --tag "$RELEASE_TAG" --assets-dir release-assets --output release-notes.md
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}
          body_path: release-notes.md
          files: release-assets/*
