name: Release / GitHub assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to, for example v0.1.123'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  server-binaries:
    name: Server binary / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: tikeo
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive_ext: tar.gz
            binary_name: tikeo
          - target: aarch64-apple-darwin
            os: macos-14
            archive_ext: tar.gz
            binary_name: tikeo
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_name: tikeo.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned protoc
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_VERSION=21.12
          case "${{ runner.os }}:${{ matrix.target }}" in
            Linux:*)
              PROTOC_ASSET="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
              PROTOC_BIN_NAME="protoc"
              ;;
            macOS:*)
              PROTOC_ASSET="protoc-${PROTOC_VERSION}-osx-universal_binary.zip"
              PROTOC_BIN_NAME="protoc"
              ;;
            Windows:*)
              PROTOC_ASSET="protoc-${PROTOC_VERSION}-win64.zip"
              PROTOC_BIN_NAME="protoc.exe"
              ;;
            *)
              echo "unsupported runner OS/target: ${{ runner.os }}:${{ matrix.target }}" >&2
              exit 1
              ;;
          esac
          PROTOC_DIR="$PWD/.protoc-${PROTOC_VERSION}"
          rm -rf "$PROTOC_DIR"
          mkdir -p "$PROTOC_DIR"
          curl -fsSLo protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ASSET}"
          unzip -q protoc.zip -d "$PROTOC_DIR"
          PROTOC_BIN="$PROTOC_DIR/bin/$PROTOC_BIN_NAME"
          if [ ! -x "$PROTOC_BIN" ]; then
            echo "downloaded protoc binary is missing or not executable: $PROTOC_BIN" >&2
            find "$PROTOC_DIR" -maxdepth 3 -type f -print >&2
            exit 1
          fi
          PROTOC_ENV="$PROTOC_BIN"
          PROTOC_PATH_ENTRY="$PROTOC_DIR/bin"
          if [ "${{ runner.os }}" = "Windows" ]; then
            PROTOC_ENV="$(cygpath -w "$PROTOC_BIN")"
            PROTOC_PATH_ENTRY="$(cygpath -w "$PROTOC_DIR/bin")"
          fi
          echo "$PROTOC_PATH_ENTRY" >> "$GITHUB_PATH"
          echo "PROTOC=$PROTOC_ENV" >> "$GITHUB_ENV"
          "$PROTOC_BIN" --version
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Sync server workspace version
        shell: bash
        run: python scripts/set-release-version.py "${{ steps.version.outputs.version }}" --tag "${{ steps.version.outputs.tag }}" --scope workspace
      - name: Build server binary
        shell: bash
        run: |
          set -euo pipefail
          echo "Using PROTOC=$PROTOC"
          cargo build --release --locked --bin tikeo --target ${{ matrix.target }}
      - name: Stage server release payload
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          PKG="tikeo-server-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/$PKG/config" "dist/$PKG/deploy"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$PKG/${{ matrix.binary_name }}"
          cp README.md "dist/$PKG/README.md"
          cp LICENSE "dist/$PKG/LICENSE"
          cp -R config/. "dist/$PKG/config/"
          cp deploy/compose/tikeo.env.example "dist/$PKG/deploy/tikeo.env.example"
          cp docker-compose.yml "dist/$PKG/docker-compose.yml"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && 7z a "$PKG.zip" "$PKG")
          else
            tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: server-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  migrate-cli-binaries:
    name: Migration CLI / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: tikeo-migrate
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive_ext: tar.gz
            binary_name: tikeo-migrate
          - target: aarch64-apple-darwin
            os: macos-14
            archive_ext: tar.gz
            binary_name: tikeo-migrate
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_name: tikeo-migrate.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Sync migration CLI workspace version
        shell: bash
        run: python scripts/set-release-version.py "${{ steps.version.outputs.version }}" --tag "${{ steps.version.outputs.tag }}" --scope workspace
      - name: Test migration CLI
        shell: bash
        run: cargo test -p tikeo-migrate --locked --target ${{ matrix.target }}
      - name: Build migration CLI binary
        shell: bash
        run: cargo build -p tikeo-migrate --release --locked --bin tikeo-migrate --target ${{ matrix.target }}
      - name: Stage migration CLI release payload
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          PKG="tikeo-migrate-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/$PKG/docs"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$PKG/${{ matrix.binary_name }}"
          cp README.md "dist/$PKG/README.md"
          cp README.zh-CN.md "dist/$PKG/README.zh-CN.md"
          cp LICENSE "dist/$PKG/LICENSE"
          cp docs/docs/integrations/migrating-from-legacy-schedulers.md "dist/$PKG/docs/migrating-from-legacy-schedulers.md"
          cp docs/i18n/zh-CN/docusaurus-plugin-content-docs/current/integrations/migrating-from-legacy-schedulers.md "dist/$PKG/docs/migrating-from-legacy-schedulers.zh-CN.md"
          cat > "dist/$PKG/QUICKSTART.md" <<'EOF'
# tikeo-migrate quickstart

1. Extract this archive.
2. Put the binary on your PATH, or copy it into the legacy Java worker project root.
3. Run `tikeo-migrate plan`. It auto-detects the Java project, legacy scheduler, Spring datasource, and known scheduler DB tables.
4. If datasource settings are not in the project, pass `--legacy-db-url`, `--legacy-db-user`, and `--legacy-db-password`. Use `--input <jobs.json>` only for offline fallback JSON.
5. Review `./.tikeo-migration/CHECKLIST.md`, `jobs.tikeo.md`, and `java-project-plan.md`.
6. Run `tikeo-migrate apply --endpoint <TIKEO_SERVER> --api-key <KEY> --dry-run` before any live import.
EOF
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && 7z a "$PKG.zip" "$PKG")
          else
            tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: tikeo-migrate-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  web-dist:
    name: Web dist package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Test web
        working-directory: web
        run: bun run test
      - name: Build web
        working-directory: web
        run: bun run build
      - name: Stage web release payload
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          PKG="tikeo-web-dist-${VERSION}"
          mkdir -p "dist/$PKG"
          cp -R web/dist "dist/$PKG/dist"
          cp -R web/nginx "dist/$PKG/nginx"
          cp web/Dockerfile "dist/$PKG/Dockerfile"
          cp web/LICENSE "dist/$PKG/LICENSE"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v6
        with:
          name: tikeo-web-dist
          path: dist/*.tar.gz
          if-no-files-found: error

  deploy-assets:
    name: Deploy tooling / Terraform, K8s, Helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            deploy/terraform/provider/go.sum
            deploy/k8s/operator/go.sum
      - name: Install Helm
        shell: bash
        run: |
          set -euo pipefail
          HELM_VERSION=3.19.2
          curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o helm.tar.gz
          tar -xzf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm
          helm version --short
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Test Terraform provider and K8s operator
        run: |
          set -euo pipefail
          (cd deploy/terraform/provider && go test ./... -count=1)
          (cd deploy/k8s/operator && go test ./... -count=1)
      - name: Build Terraform provider binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for entry in "${targets[@]}"; do
            set -- $entry
            os="$1"; arch="$2"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            out="terraform-provider-tikeo_v${VERSION}_${os}_${arch}${ext}"
            (cd deploy/terraform/provider && GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "../../../dist/$out" .)
            if [ "$os" = "windows" ]; then
              (cd dist && 7z a "${out}.zip" "$out" && rm "$out")
            else
              tar -C dist -czf "dist/${out}.tar.gz" "$out"
              rm "dist/$out"
            fi
          done
      - name: Build K8s operator binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for entry in "${targets[@]}"; do
            set -- $entry
            os="$1"; arch="$2"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            pkg="tikeo-operator-${VERSION}-${os}-${arch}"
            mkdir -p "dist/$pkg"
            (cd deploy/k8s/operator && GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "../../../dist/$pkg/tikeo-operator${ext}" ./cmd/tikeo-operator)
            cp deploy/k8s/operator/README.md "dist/$pkg/README.md"
            cp deploy/k8s/crd/tikeo-manifest-crd.yaml "dist/$pkg/tikeo-manifest-crd.yaml"
            if [ "$os" = "windows" ]; then
              (cd dist && 7z a "$pkg.zip" "$pkg" && rm -rf "$pkg")
            else
              tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"
              rm -rf "dist/$pkg"
            fi
          done
      - name: Package K8s manifests, compose files, and Helm chart
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          python scripts/set-release-version.py "$VERSION" --tag "$RELEASE_TAG" --scope workspace
          helm lint deploy/helm/tikeo
          helm package deploy/helm/tikeo --destination dist
          cp deploy/k8s/tikeo.yaml "dist/tikeo-k8s-manifest-${VERSION}.yaml"
          cp deploy/k8s/crd/tikeo-manifest-crd.yaml "dist/tikeo-manifest-crd-${VERSION}.yaml"
          cp docker-compose.yml "dist/tikeo-docker-compose-sqlite-${VERSION}.yml"
          cp docker-compose.postgres.yml "dist/tikeo-docker-compose-postgres-${VERSION}.yml"
          cp docker-compose.mysql.yml "dist/tikeo-docker-compose-mysql-${VERSION}.yml"
          tar -C deploy -czf "dist/tikeo-deploy-sources-${VERSION}.tar.gz" terraform k8s helm gitops systemd compose bare-metal README.md
      - uses: actions/upload-artifact@v6
        with:
          name: deploy-assets
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.tgz
            dist/*.yaml
            dist/*.yml
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: [server-binaries, migrate-cli-binaries, web-dist, deploy-assets]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort
      - name: Generate bilingual changelog
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          git fetch --force --tags
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | awk -v current="$RELEASE_TAG" 'found {print; exit} $0 == current {found=1}')"
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..$RELEASE_TAG"
            RANGE_ZH="${PREVIOUS_TAG} 到 ${RELEASE_TAG}"
            RANGE_EN="${PREVIOUS_TAG} to ${RELEASE_TAG}"
          else
            RANGE="$RELEASE_TAG"
            RANGE_ZH="首次发布到 ${RELEASE_TAG}"
            RANGE_EN="Initial history to ${RELEASE_TAG}"
          fi

          CHANGELOG="$(git log --date=short --pretty=format:'- %h %ad %an: %s' "$RANGE")"
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No commits found for this release range."
          fi

          ASSETS="$(find release-assets -maxdepth 1 -type f -printf '- %f\n' | sort)"
          if [ -z "$ASSETS" ]; then
            ASSETS="- No release assets were generated."
          fi

          {
            echo "# Tikeo ${RELEASE_TAG}"
            echo
            echo "## English"
            echo
            echo "### Version range"
            echo
            echo "- Current version: ${RELEASE_TAG}"
            echo "- Change range: ${RANGE_EN}"
            echo
            echo "### Release assets"
            echo
            printf '%s\n' "${ASSETS}"
            echo
            echo "### Complete changelog"
            echo
            printf '%s\n' "${CHANGELOG}"
            echo
            echo "## 中文"
            echo
            echo "### 版本范围"
            echo
            echo "- 当前版本：${RELEASE_TAG}"
            echo "- 变更范围：${RANGE_ZH}"
            echo
            echo "### 发布产物"
            echo
            printf '%s\n' "${ASSETS}"
            echo
            echo "### 完整变更日志"
            echo
            printf '%s\n' "${CHANGELOG}"
          } > release-notes.md
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref_name || inputs.tag, '-') }}
          body_path: release-notes.md
          files: release-assets/*
