name: Release / GitHub assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  server-binaries:
    name: Server binary / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: tikee
          - target: x86_64-apple-darwin
            os: macos-13
            archive_ext: tar.gz
            binary_name: tikee
          - target: aarch64-apple-darwin
            os: macos-14
            archive_ext: tar.gz
            binary_name: tikee
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_name: tikee.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build server binary
        run: cargo build --release --locked --bin tikee --target ${{ matrix.target }}
      - name: Stage server release payload
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          PKG="tikee-server-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/$PKG/config" "dist/$PKG/deploy"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$PKG/${{ matrix.binary_name }}"
          cp README.md "dist/$PKG/README.md"
          cp -R config/. "dist/$PKG/config/"
          cp deploy/compose/tikee.env.example "dist/$PKG/deploy/tikee.env.example"
          cp docker-compose.yml "dist/$PKG/docker-compose.yml"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && 7z a "$PKG.zip" "$PKG")
          else
            tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  web-dist:
    name: Web dist package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Test web
        working-directory: web
        run: bun test
      - name: Build web
        working-directory: web
        run: bun run build
      - name: Stage web release payload
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          PKG="tikee-web-dist-${VERSION}"
          mkdir -p "dist/$PKG"
          cp -R web/dist "dist/$PKG/dist"
          cp -R web/nginx "dist/$PKG/nginx"
          cp web/Dockerfile "dist/$PKG/Dockerfile"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v4
        with:
          name: tikee-web-dist
          path: dist/*.tar.gz
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: [server-binaries, web-dist]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort
      - name: Generate bilingual changelog
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          git fetch --force --tags
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | awk -v current="$RELEASE_TAG" 'found {print; exit} $0 == current {found=1}')"
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..$RELEASE_TAG"
            RANGE_ZH="${PREVIOUS_TAG} 到 ${RELEASE_TAG}"
            RANGE_EN="${PREVIOUS_TAG} to ${RELEASE_TAG}"
          else
            RANGE="$RELEASE_TAG"
            RANGE_ZH="首次发布到 ${RELEASE_TAG}"
            RANGE_EN="Initial history to ${RELEASE_TAG}"
          fi

          CHANGELOG="$(git log --date=short --pretty=format:'- %h %ad %an: %s' "$RANGE")"
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No commits found for this release range."
          fi

          ASSETS="$(find release-assets -maxdepth 1 -type f -printf '- %f\n' | sort)"
          if [ -z "$ASSETS" ]; then
            ASSETS="- No release assets were generated."
          fi

          {
            echo "# Tikee ${RELEASE_TAG}"
            echo
            echo "## English"
            echo
            echo "### Version range"
            echo
            echo "- Current version: ${RELEASE_TAG}"
            echo "- Change range: ${RANGE_EN}"
            echo
            echo "### Release assets"
            echo
            printf '%s\n' "${ASSETS}"
            echo
            echo "### Complete changelog"
            echo
            printf '%s\n' "${CHANGELOG}"
            echo
            echo "## 中文"
            echo
            echo "### 版本范围"
            echo
            echo "- 当前版本：${RELEASE_TAG}"
            echo "- 变更范围：${RANGE_ZH}"
            echo
            echo "### 发布产物"
            echo
            printf '%s\n' "${ASSETS}"
            echo
            echo "### 完整变更日志"
            echo
            printf '%s\n' "${CHANGELOG}"
          } > release-notes.md
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref_name || inputs.tag, '-') }}
          body_path: release-notes.md
          files: release-assets/*
