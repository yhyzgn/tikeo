name: CI / Migration CLI binaries

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/tikeo-core/**'
      - 'crates/tikeo-migrate/**'
      - '.github/workflows/build-migrate-cli.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/tikeo-core/**'
      - 'crates/tikeo-migrate/**'
      - '.github/workflows/build-migrate-cli.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from. Defaults to the current ref.'
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

concurrency:
  group: migrate-cli-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  binaries:
    name: Migration CLI / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: tikeo-migrate
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive_ext: tar.gz
            binary_name: tikeo-migrate
          - target: aarch64-apple-darwin
            os: macos-14
            archive_ext: tar.gz
            binary_name: tikeo-migrate
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_name: tikeo-migrate.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Test migration CLI
        shell: bash
        run: cargo test -p tikeo-migrate --locked --target ${{ matrix.target }}
      - name: Build migration CLI binary
        shell: bash
        run: cargo build -p tikeo-migrate --release --locked --bin tikeo-migrate --target ${{ matrix.target }}
      - name: Stage migration CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="ci-${GITHUB_SHA::12}"
          PKG="tikeo-migrate-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/$PKG/docs"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$PKG/${{ matrix.binary_name }}"
          cp README.md "dist/$PKG/README.md"
          cp README.zh-CN.md "dist/$PKG/README.zh-CN.md"
          cp LICENSE "dist/$PKG/LICENSE"
          cp docs/docs/integrations/migrating-from-legacy-schedulers.md "dist/$PKG/docs/migrating-from-legacy-schedulers.md"
          cp docs/i18n/zh-CN/docusaurus-plugin-content-docs/current/integrations/migrating-from-legacy-schedulers.md "dist/$PKG/docs/migrating-from-legacy-schedulers.zh-CN.md"
          cat > "dist/$PKG/QUICKSTART.md" <<'EOF'
          # tikeo-migrate quickstart

          1. Extract this archive.
          2. Put the binary on your PATH, or copy it into the legacy Java worker project root.
          3. Run `tikeo-migrate plan`. It auto-detects the Java project, legacy scheduler, Spring datasource, and known scheduler DB tables.
          4. If datasource settings are not in the project, pass `--legacy-db-url`, `--legacy-db-user`, and `--legacy-db-password`. Use `--input <jobs.json>` only for offline fallback JSON.
          5. Review `./.tikeo-migration/CHECKLIST.md`, `jobs.tikeo.md`, and `java-project-plan.md`.
          6. Run `tikeo-migrate apply --bundle ./.tikeo-migration --output-project ../legacy-worker-tikeo` locally, fill generated endpoint/API-key placeholders in the migrated Spring config, then import reviewed jobs through the console, Management API, or GitOps.
          EOF
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && 7z a "$PKG.zip" "$PKG")
          else
            tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: tikeo-migrate-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
