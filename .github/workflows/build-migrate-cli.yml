name: CI / Migration CLI binaries

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/tikeo-core/**'
      - 'crates/tikeo-migrate/**'
      - '.github/workflows/build-migrate-cli.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/tikeo-core/**'
      - 'crates/tikeo-migrate/**'
      - '.github/workflows/build-migrate-cli.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from. Defaults to the current ref.'
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

concurrency:
  group: migrate-cli-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  binaries:
    name: Migration CLI / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: x86_64-apple-darwin
            os: macos-15-intel
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: aarch64-apple-darwin
            os: macos-14
            binary_name: tikeo-migrate
            asset_ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: tikeo-migrate.exe
            asset_ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            binary_name: tikeo-migrate.exe
            asset_ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Test migration CLI
        shell: bash
        run: cargo test -p tikeo-migrate --locked --target ${{ matrix.target }}
      - name: Build migration CLI binary
        shell: bash
        run: cargo build -p tikeo-migrate --release --locked --bin tikeo-migrate --target ${{ matrix.target }}
      - name: Stage migration CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="ci-${GITHUB_SHA::12}"
          ASSET="tikeo-migrate-${VERSION}-${{ matrix.target }}${{ matrix.asset_ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$ASSET"
          chmod +x "dist/$ASSET" || true
      - uses: actions/upload-artifact@v6
        with:
          name: tikeo-migrate-${{ matrix.target }}
          path: dist/tikeo-migrate-*
          if-no-files-found: error
