name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  server:
    name: Server / Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features -- --test-threads=1
      - name: Build
        run: cargo build --workspace --all-features

  web:
    name: Web / React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Lint
        working-directory: web
        run: bun run lint
      - name: Typecheck
        working-directory: web
        run: bun run typecheck
      - name: Test
        working-directory: web
        run: bun test
      - name: Build
        working-directory: web
        run: bun run build

  java-sdk:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test Java SDK
        working-directory: sdks/java
        run: ./gradlew test
      - name: Build Java SDK jars
        working-directory: sdks/java
        run: ./gradlew jar sourcesJar

  java-demos:
    name: Java worker demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test Spring Boot 2 worker demo
        working-directory: examples/java/spring-boot2-worker-demo
        run: ./gradlew test --no-daemon
      - name: Test Spring Boot 3 worker demo
        working-directory: examples/java/spring-boot3-worker-demo
        run: ./gradlew test --no-daemon
      - name: Test Spring Boot 4 worker demo
        working-directory: examples/java/spring-boot4-worker-demo
        run: ./gradlew test --no-daemon

  go-sdk-demo:
    name: Go SDK and demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            sdks/go/tikee/go.sum
            examples/go/worker-demo/go.sum
      - name: Test Go SDK
        working-directory: sdks/go/tikee
        run: go test ./... -count=1
      - name: Test Go worker demo
        working-directory: examples/go/worker-demo
        run: go test ./... -count=1

  go-deploy-tools:
    name: Go deploy tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            deploy/terraform/provider/go.sum
            deploy/k8s/operator/go.sum
      - name: Test Terraform provider
        working-directory: deploy/terraform/provider
        run: go test ./... -count=1
      - name: Test K8s operator
        working-directory: deploy/k8s/operator
        run: go test ./... -count=1

  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust/tikee -> target
      - name: Format Rust SDK
        run: cargo fmt --manifest-path sdks/rust/tikee/Cargo.toml -- --check
      - name: Clippy Rust SDK
        run: cargo clippy --manifest-path sdks/rust/tikee/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test Rust SDK
        run: cargo test --manifest-path sdks/rust/tikee/Cargo.toml --all-features
      - name: Package Rust SDK
        run: cargo package --manifest-path sdks/rust/tikee/Cargo.toml --allow-dirty

  rust-demo:
    name: Rust worker demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/rust/worker-demo -> target
      - name: Format Rust worker demo
        run: cargo fmt --manifest-path examples/rust/worker-demo/Cargo.toml -- --check
      - name: Clippy Rust worker demo
        run: cargo clippy --manifest-path examples/rust/worker-demo/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test Rust worker demo
        run: cargo test --manifest-path examples/rust/worker-demo/Cargo.toml --all-features

  cross-language-smoke:
    name: Cross-language worker smoke
    runs-on: ubuntu-latest
    needs: [server, web, java-sdk, java-demos, go-sdk-demo, rust-sdk, rust-demo]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            sdks/go/tikee/go.sum
            examples/go/worker-demo/go.sum
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Run cross-language worker parity smoke
        run: deploy/smoke/cross-language-worker-parity-smoke.sh
      - name: Upload cross-language smoke report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cross-language-worker-smoke
          path: .dev/reports/cross-language-workers-*/*
          if-no-files-found: warn

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - server
      - web
      - java-sdk
      - java-demos
      - go-sdk-demo
      - go-deploy-tools
      - rust-sdk
      - rust-demo
      - cross-language-smoke
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build server image without push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          platforms: linux/amd64
      - name: Build web image without push
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          push: false
          load: false
          platforms: linux/amd64
