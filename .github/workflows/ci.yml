name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  server:
    name: Server / Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features -- --test-threads=1
      - name: Build
        run: cargo build --workspace --all-features

  web:
    name: Web / React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Lint
        working-directory: web
        run: bun run lint
      - name: Typecheck
        working-directory: web
        run: bun run typecheck
      - name: Test
        working-directory: web
        run: bun test
      - name: Build
        working-directory: web
        run: bun run build

  java-sdk:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test Java SDK
        working-directory: sdks/java
        run: ./gradlew test
      - name: Build Java SDK jars
        working-directory: sdks/java
        run: ./gradlew jar sourcesJar

  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust/tikee -> target
      - name: Format Rust SDK
        run: cargo fmt --manifest-path sdks/rust/tikee/Cargo.toml -- --check
      - name: Clippy Rust SDK
        run: cargo clippy --manifest-path sdks/rust/tikee/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test Rust SDK
        run: cargo test --manifest-path sdks/rust/tikee/Cargo.toml --all-features
      - name: Package Rust SDK
        run: cargo package --manifest-path sdks/rust/tikee/Cargo.toml --allow-dirty

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [server, web, java-sdk, rust-sdk]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build server image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          platforms: linux/amd64
      - name: Build web image without push
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: false
          load: false
          platforms: linux/amd64
