name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  workflow-policy:
    name: Other / workflow policy
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository without JavaScript actions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init -b policy-check .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
      - name: Reject deprecated GitHub Actions Node runtimes
        run: python3 scripts/verify-github-actions-node-runtime.py --min-node-major 24

  server:
    name: Server
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features -- --test-threads=1
      - name: Build
        run: cargo build --workspace --all-features

  web:
    name: Web
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Lint
        working-directory: web
        run: bun run lint
      - name: Typecheck
        working-directory: web
        run: bun run typecheck
      - name: Test
        working-directory: web
        run: bun test
      - name: Build
        working-directory: web
        run: bun run build

  java-sdk-demo:
    name: Java SDK + demo
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test Java SDK
        working-directory: sdks/java
        run: ./gradlew test
      - name: Build Java SDK jars
        working-directory: sdks/java
        run: ./gradlew jar sourcesJar
      - name: Test Spring Boot 2 worker demo
        working-directory: examples/java/spring-boot2-worker-demo
        run: ./gradlew test --no-daemon
      - name: Test Spring Boot 3 worker demo
        working-directory: examples/java/spring-boot3-worker-demo
        run: ./gradlew test --no-daemon
      - name: Test Spring Boot 4 worker demo
        working-directory: examples/java/spring-boot4-worker-demo
        run: ./gradlew test --no-daemon

  rust-sdk-demo:
    name: Rust SDK + demo
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdks/rust/tikeo -> target
            examples/rust/worker-demo -> target
      - name: Format Rust SDK
        run: cargo fmt --manifest-path sdks/rust/tikeo/Cargo.toml -- --check
      - name: Clippy Rust SDK
        run: cargo clippy --manifest-path sdks/rust/tikeo/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test Rust SDK
        run: cargo test --manifest-path sdks/rust/tikeo/Cargo.toml --all-features
      - name: Package Rust SDK
        run: cargo package --manifest-path sdks/rust/tikeo/Cargo.toml --allow-dirty
      - name: Format Rust worker demo
        run: cargo fmt --manifest-path examples/rust/worker-demo/Cargo.toml -- --check
      - name: Clippy Rust worker demo
        run: cargo clippy --manifest-path examples/rust/worker-demo/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test Rust worker demo
        run: cargo test --manifest-path examples/rust/worker-demo/Cargo.toml --all-features

  go-sdk-demo:
    name: Go SDK + demo
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            sdks/go/tikeo/go.sum
            examples/go/worker-demo/go.sum
      - name: Test Go SDK
        working-directory: sdks/go/tikeo
        run: go test ./... -count=1
      - name: Test Go worker demo
        working-directory: examples/go/worker-demo
        run: go test ./... -count=1

  python-sdk-demo:
    name: Python SDK + demo
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            sdks/python/tikeo/pyproject.toml
            examples/python/worker-demo/pyproject.toml
      - name: Install Python SDK and demo
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e sdks/python/tikeo[test]
          python -m pip install -e examples/python/worker-demo[test]
      - name: Test Python SDK and demo
        run: python -m pytest sdks/python/tikeo/tests examples/python/worker-demo/tests -q
      - name: Python demo dry-run smoke
        env:
          TIKEO_WORKER_DRY_RUN: '1'
          TIKEO_SANDBOX_AUTO_INSTALL: '0'
        run: python -m tikeo_python_worker_demo

  nodejs-sdk-demo:
    name: Node.js SDK + demo
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Node.js SDK dependencies
        working-directory: sdks/nodejs/tikeo
        run: bun install --frozen-lockfile
      - name: Test Node.js SDK
        working-directory: sdks/nodejs/tikeo
        run: bun test
      - name: Build Node.js SDK
        working-directory: sdks/nodejs/tikeo
        run: bun run build
      - name: Install Node.js demo dependencies
        working-directory: examples/nodejs/worker-demo
        run: bun install --frozen-lockfile
      - name: Test Node.js demo
        working-directory: examples/nodejs/worker-demo
        run: bun test
      - name: Node.js demo dry-run smoke
        working-directory: examples/nodejs/worker-demo
        env:
          TIKEO_WORKER_DRY_RUN: '1'
          TIKEO_SANDBOX_AUTO_INSTALL: '0'
        run: bun start

  other-deploy-tools:
    name: Other / deploy tooling
    runs-on: ubuntu-latest
    needs: workflow-policy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            deploy/terraform/provider/go.sum
            deploy/k8s/operator/go.sum
      - name: Test Terraform provider
        working-directory: deploy/terraform/provider
        run: go test ./... -count=1
      - name: Test K8s operator
        working-directory: deploy/k8s/operator
        run: go test ./... -count=1

  other-cross-language-smoke:
    name: Other / cross-language worker smoke
    runs-on: ubuntu-latest
    needs: [server, web, java-sdk-demo, go-sdk-demo, rust-sdk-demo, python-sdk-demo, nodejs-sdk-demo]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            sdks/go/tikeo/go.sum
            examples/go/worker-demo/go.sum
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            sdks/python/tikeo/pyproject.toml
            examples/python/worker-demo/pyproject.toml
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Install Python worker demo dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e sdks/python/tikeo
          python -m pip install -e examples/python/worker-demo
      - name: Install Node.js worker demo dependencies
        working-directory: examples/nodejs/worker-demo
        run: bun install --frozen-lockfile
      - name: Run cross-language worker parity smoke
        run: deploy/smoke/cross-language-worker-parity-smoke.sh
      - name: Upload cross-language smoke report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cross-language-worker-smoke
          path: .dev/reports/cross-language-workers-*/*
          if-no-files-found: warn

  other-docker-build-server:
    name: Other / Docker build validation / server
    runs-on: ubuntu-latest
    needs:
      - server
      - java-sdk-demo
      - rust-sdk-demo
      - go-sdk-demo
      - python-sdk-demo
      - nodejs-sdk-demo
      - other-deploy-tools
      - other-cross-language-smoke
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build server image without push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  other-docker-build-web:
    name: Other / Docker build validation / web
    runs-on: ubuntu-latest
    needs:
      - web
      - other-cross-language-smoke
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build web image without push
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
