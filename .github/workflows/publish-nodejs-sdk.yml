name: Publish / Node.js SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish Node.js SDK, for example v0.1.123'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: nodejs-sdk-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Package and optionally publish Node.js SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.ref_name || inputs.tag }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Node.js SDK dependencies
        working-directory: sdks/nodejs/tikeo
        run: bun install --frozen-lockfile
      - name: Test Node.js SDK
        working-directory: sdks/nodejs/tikeo
        run: bun test
      - name: Build Node.js SDK
        working-directory: sdks/nodejs/tikeo
        run: bun run build
      - name: Install Node.js demo dependencies
        working-directory: examples/nodejs/worker-demo
        run: bun install --frozen-lockfile
      - name: Test Node.js demo
        working-directory: examples/nodejs/worker-demo
        run: bun test
      - name: Node.js demo dry-run smoke
        working-directory: examples/nodejs/worker-demo
        env:
          TIKEO_WORKER_DRY_RUN: '1'
          TIKEO_SANDBOX_AUTO_INSTALL: '0'
        run: bun start
      - name: Set Node.js SDK version from tag
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          version = '${{ steps.version.outputs.version }}'
          p = Path('sdks/nodejs/tikeo/package.json')
          data = json.loads(p.read_text())
          data['version'] = version
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
          PY
      - name: Pack Node.js SDK
        working-directory: sdks/nodejs/tikeo
        run: |
          mkdir -p ../../../dist
          npm pack --pack-destination ../../../dist
      - name: Stage Node.js SDK release payload
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PKG="nodejs-sdk-${VERSION}"
          mkdir -p "dist/$PKG"
          cp dist/yhyzgn-tikeo-*.tgz "dist/$PKG/"
          cp -R sdks/nodejs/tikeo/README.md sdks/nodejs/tikeo/package.json "dist/$PKG/"
          tar -C dist -czf "dist/$PKG.tar.gz" "$PKG"
      - name: Publish Node.js SDK to npm when configured
        working-directory: sdks/nodejs/tikeo
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish --access public
      - name: Upload Node.js SDK package to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: dist/*.tar.gz
