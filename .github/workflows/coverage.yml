name: Coverage

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate Rust LCOV report
        run: |
          set -euo pipefail
          mkdir -p coverage
          cargo llvm-cov --workspace --all-features --lcov --output-path coverage/rust.lcov
      - name: Install Codecov CLI
        run: python3 -m pip install --user codecov-cli
      - name: Upload Rust coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -euo pipefail
          ~/.local/bin/codecovcli upload-process \
            --token "$CODECOV_TOKEN" \
            --commit-sha "$GITHUB_SHA" \
            --branch "$GITHUB_REF_NAME" \
            --slug "$GITHUB_REPOSITORY" \
            --file coverage/rust.lcov \
            --disable-search \
            --flag rust \
            --name rust-workspace \
            --fail-on-error
