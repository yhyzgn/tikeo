name: Publish / Docker docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish, for example v0.1.123'
        required: true
        type: string
      ref:
        description: 'Git ref to build from. Defaults to the tag input.'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: docker-docs-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish docs image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || inputs.tag) || github.ref }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: yhyzgn/tikeo-docs
          tags: |
            type=raw,value=${{ github.ref_name || inputs.tag }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref_name, 'v0.') }}
      - name: Build and push docs image
        uses: docker/build-push-action@v7
        with:
          context: docs
          file: docs/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
