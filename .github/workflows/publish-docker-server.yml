name: Publish / Docker server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish, for example v0.1.123'
        required: true
        type: string
      ref:
        description: 'Git ref to build from. Defaults to the tag input.'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: docker-server-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || inputs.tag) || github.ref }}
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check release version consistency
        shell: bash
        run: python scripts/check-release-version.py "${{ steps.version.outputs.version }}" --tag "${{ steps.version.outputs.tag }}"

      - name: Verify release tag commit
        id: buildmeta
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          TAG_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "release tag $RELEASE_TAG points to $TAG_SHA but checkout HEAD is $HEAD_SHA" >&2
            exit 1
          fi
          echo "git_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: yhyzgn/tikeo-server
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TIKEO_GIT_TAG=${{ steps.version.outputs.tag }}
            TIKEO_GIT_SHA=${{ steps.buildmeta.outputs.git_sha }}
            TIKEO_BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
            TIKEO_GIT_DIRTY=false
          provenance: false
          sbom: false
      - name: Update Docker Hub overview
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: >-
          python3 scripts/update-dockerhub-overview.py
          --repository yhyzgn/tikeo-server
          --readme dockerhub/overviews/tikeo-server.md
          --description "Tikeo Server runtime for jobs, workers, logs, notifications, and management APIs."
