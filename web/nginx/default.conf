server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Versioned Management API routes. This block is intentionally declared before /api/ so
    # /api/v1/**/stream SSE endpoints get streaming-safe proxy settings instead of the
    # generic API fallback below.
    location /api/v1/ {
        proxy_pass http://tikeo-server:9090/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # SSE endpoints live under /api/v1/**/stream. Keep this API route streaming-safe.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        gzip off;
        add_header X-Accel-Buffering no always;
    }

    # Generic API fallback for non-v1 or future API paths. Keep this separate from /api/v1/
    # because ordinary JSON/REST routes do not need the heavier long-lived SSE settings.
    location /api/ {
        proxy_pass http://tikeo-server:9090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api-docs/ {
        proxy_pass http://tikeo-server:9090/api-docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        alias /usr/share/nginx/html/;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
